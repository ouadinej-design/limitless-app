<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGAN ELITE STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; margin: 0; padding: 0; }
        .chogan-font { font-family: 'Cinzel', serif; }
        
        /* Carte Produit - Style Joaillerie */
        .product-card { 
            background: #ffffff; 
            border: 1px solid #eee; 
            border-radius: 15px; 
            padding: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        /* Avatar à la place de l'image absente */
        .img-placeholder {
            height: 80px;
            width: 80px;
            margin: 0 auto 10px;
            background: #fffaf0;
            border: 1px solid #f3e5ab;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-weight: bold;
            font-size: 24px;
        }

        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; }

        .btn-gold { background: #b8860b; color: white; border-radius: 10px; font-weight: 800; font-size: 10px; text-transform: uppercase; width: 100%; padding: 10px 0; }
        
        /* Switch Devise Fixe */
        .switch-box { background: #f9f9f9; border-radius: 30px; display: flex; padding: 4px; border: 1px solid #eee; width: 220px; margin: 0 auto; cursor: pointer; }
        .sw-opt { flex: 1; text-align: center; padding: 6px; font-size: 9px; font-weight: 900; border-radius: 20px; transition: 0.3s; color: #ccc; }
        .sw-opt.active { background: #1a1a1a; color: #fff; }
        .currency-dzd .sw-opt.active { background: var(--gold); }

        .cat-btn { padding: 8px 12px; border-radius: 10px; font-size: 9px; font-weight: 800; border: 1px solid #eee; color: #888; white-space: nowrap; }
        .cat-btn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen relative">
        
        <header class="p-4 sticky top-0 bg-white/95 z-50 border-b border-gray-50 flex justify-between items-center">
            <div>
                <h1 class="chogan-font text-lg tracking-widest">CHOGAN</h1>
                <p class="text-[7px] font-black text-amber-600 tracking-widest uppercase">Elite Marie</p>
            </div>
            <div class="bg-gray-50 px-2 py-1 rounded-lg border border-gray-100 flex items-center space-x-1">
                <span class="text-[7px] font-black text-gray-400 uppercase">Rate:</span>
                <input type="number" id="rate" value="240" onchange="renderCatalog()" class="w-8 bg-transparent text-[10px] font-black outline-none text-center">
            </div>
        </header>

        <div id="tab1" class="tab-content active p-4">
            <input type="text" id="search" onkeyup="renderCatalog()" placeholder="Rechercher marque, ref, notes..." 
                   class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl text-xs outline-none mb-4 focus:border-amber-200">
            
            <div id="currency-switch" class="switch-box mb-6" onclick="toggleCurrency()">
                <div id="opt-eur" class="sw-opt active text-white">EUROS (€)</div>
                <div id="opt-dzd" class="sw-opt">DINARS (DA)</div>
            </div>

            <div class="flex space-x-2 overflow-x-auto mb-6 pb-2 no-scrollbar">
                <button onclick="setCategory('all')" class="cat-btn active" id="btn-all">TOUT</button>
                <button onclick="setCategory('Luxury')" class="cat-btn" id="btn-Luxury">LUXURY</button>
                <button onclick="setCategory('Femme')" class="cat-btn" id="btn-Femme">FEMME</button>
                <button onclick="setCategory('Homme')" class="cat-btn" id="btn-Homme">HOMME</button>
            </div>

            <div id="grid" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div id="tab2" class="tab-content p-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="chogan-font text-lg">MA COMMANDE</h2>
                <button onclick="resetCart()" class="text-[8px] font-black text-red-400 border border-red-100 px-3 py-1 rounded-full uppercase">Vider</button>
            </div>
            <div id="cart-list" class="space-y-2 mb-6"></div>
            <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-black text-gray-400 uppercase">TOTAL À PAYER</span>
                    <span id="final-total" class="text-2xl font-black text-gray-900">0 €</span>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 grid grid-cols-7 p-2 z-50 bg-white border-t border-gray-100 shadow-lg">
            <button onclick="showTab(1)" class="flex flex-col items-center py-2"><span class="text-lg">🛍️</span><span class="text-[6px] font-bold">SHOP</span></button>
            <button onclick="showTab(2)" class="flex flex-col items-center py-2"><span class="text-lg">📜</span><span class="text-[6px] font-bold">ORDRE</span></button>
            <button onclick="showTab(3)" class="flex flex-col items-center py-2 opacity-20"><span class="text-lg">💎</span><span class="text-[6px] font-bold">CLUB</span></button>
            <button onclick="showTab(4)" class="flex flex-col items-center py-2 opacity-20"><span class="text-lg">📈</span><span class="text-[6px] font-bold">GOAL</span></button>
            <button onclick="showTab(5)" class="flex flex-col items-center py-2 opacity-20"><span class="text-lg">📢</span><span class="text-[6px] font-bold">NEWS</span></button>
            <button onclick="showTab(6)" class="flex flex-col items-center py-2 opacity-20"><span class="text-lg">🎓</span><span class="text-[6px] font-bold">LEARN</span></button>
            <button onclick="showTab(7)" class="flex flex-col items-center py-2 opacity-20"><span class="text-lg">👤</span><span class="text-[6px] font-bold">MOI</span></button>
        </nav>
    </div>

    <script>
        let currentCurrency = 'EUR';
        let currentCategory = 'all';
        let cart = [];

        // CATALOGUE ROBUSTE
        const products = [
            { id: '118', type: 'Luxury', brand: 'Baccarat Rouge 540', name: 'Kurkdjian', price: 52 },
            { id: '127', type: 'Luxury', brand: 'Oud Wood', name: 'Tom Ford', price: 52 },
            { id: '139', type: 'Luxury', brand: 'Sables Roses', name: 'Louis Vuitton', price: 65 },
            { id: '110', type: 'Luxury', brand: 'Kirke', name: 'Tiziana T.', price: 48 },
            { id: '042', type: 'Femme', brand: 'La Vie est Belle', name: 'Lancôme', price: 35 },
            { id: '055', type: 'Femme', brand: 'Black Opium', name: 'YSL', price: 35 },
            { id: '007', type: 'Femme', brand: 'J’adore', name: 'Dior', price: 35 },
            { id: '023', type: 'Femme', brand: 'Hypnotic Poison', name: 'Dior', price: 35 },
            { id: '038', type: 'Homme', brand: 'Bleu de Chanel', name: 'Chanel', price: 35 },
            { id: '001', type: 'Homme', brand: 'One Million', name: 'Rabanne', price: 35 },
            { id: '068', type: 'Homme', brand: 'Aventus', name: 'Creed', price: 57 },
            { id: '061', type: 'Homme', brand: 'Sauvage', name: 'Dior', price: 35 }
        ];

        function toggleCurrency() {
            currentCurrency = (currentCurrency === 'EUR') ? 'DZD' : 'EUR';
            const switchEl = document.getElementById('currency-switch');
            switchEl.className = currentCurrency === 'EUR' ? 'switch-box' : 'switch-box currency-dzd';
            document.getElementById('opt-eur').className = currentCurrency === 'EUR' ? 'sw-opt active' : 'sw-opt';
            document.getElementById('opt-dzd').className = currentCurrency === 'DZD' ? 'sw-opt active' : 'sw-opt';
            renderCatalog();
            calcTotal();
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.className = 'cat-btn');
            document.getElementById('btn-' + cat).className = 'cat-btn active';
            renderCatalog();
        }

        function renderCatalog() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            const rate = document.getElementById('rate').value;
            grid.innerHTML = '';

            const filtered = products.filter(p => {
                const matchSearch = p.brand.toLowerCase().includes(search) || p.id.includes(search);
                const matchCat = currentCategory === 'all' || p.type === currentCategory;
                return matchSearch && matchCat;
            });

            filtered.forEach(p => {
                const price = (currentCurrency === 'EUR') ? p.price + ' €' : Math.round(p.price * rate).toLocaleString() + ' DA';
                const initial = p.brand.charAt(0);
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="img-placeholder">${initial}</div>
                        <p class="text-[7px] font-black text-amber-500 uppercase">REF: ${p.id}</p>
                        <h3 class="text-[9px] font-black uppercase text-gray-900 leading-tight mb-1">${p.brand}</h3>
                        <p class="text-[8px] font-bold text-gray-300 mb-2 italic">${p.name}</p>
                        <p class="text-[11px] font-black mb-3">${price}</p>
                        <button onclick="addToCart('${p.brand}', ${p.price})" class="btn-gold">Ajouter</button>
                    </div>`;
            });
        }

        function addToCart(brand, price) {
            cart.push({brand, price});
            renderCart();
            showTab(2);
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const rate = document.getElementById('rate').value;
            list.innerHTML = cart.length ? '' : '<div class="py-10 text-center text-gray-300 text-xs italic">Panier vide</div>';
            cart.forEach((item, i) => {
                const p = (currentCurrency === 'EUR') ? item.price + ' €' : Math.round(item.price * rate).toLocaleString() + ' DA';
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white border border-gray-100 rounded-xl shadow-sm">
                        <div class="flex flex-col"><span class="text-[9px] font-black uppercase text-gray-800">${item.brand}</span><span class="text-[8px] font-bold text-amber-600">${p}</span></div>
                        <button onclick="remove(${i})" class="text-gray-200 hover:text-red-400">✕</button>
                    </div>`;
            });
            calcTotal();
        }

        function calcTotal() {
            const rate = document.getElementById('rate').value;
            const sub = cart.reduce((s, i) => s + i.price, 0);
            const total = (currentCurrency === 'EUR') ? sub.toFixed(2) + " €" : Math.round(sub * rate).toLocaleString() + " DA";
            document.getElementById('final-total').innerText = total;
        }

        function remove(i) { cart.splice(i, 1); renderCart(); }
        function resetCart() { cart = []; renderCart(); }

        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('nav button').forEach((b, i) => b.style.opacity = (i+1 === n) ? '1' : '0.2');
        }

        renderCatalog();
    </script>
</body>
</html>
