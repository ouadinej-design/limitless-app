<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHOGAN PRESTIGE - MARIE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; padding-bottom: 110px; overflow-x: hidden; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .gold-text { color: #C5A059; }
        .nav-bar { background: #0a0a0a; border-top: 1px solid #222; height: 85px; position: fixed; bottom: 0; width: 100%; display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 7px; color: #555; font-weight: bold; text-transform: uppercase; border: none; background: none; }
        .nav-item.active { color: #C5A059; font-weight: 900; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; margin-bottom: 12px; padding: 15px; }
        .btn-format { background: #C5A059; color: #000; font-size: 9px; font-weight: 900; padding: 10px 2px; border-radius: 6px; text-align: center; border: none; }
        .btn-format:active { background: #fff; transform: scale(0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="p-5 text-center bg-black border-b border-zinc-900 sticky top-0 z-50">
        <h1 class="text-xl font-black tracking-[4px] gold-text">CHOGAN</h1>
        <p class="text-[8px] text-zinc-500 tracking-[3px] uppercase">Luxury Group - Marie</p>
    </header>

    <div id="p1" class="page active p-6">
        <h2 class="gold-text font-black text-center mb-6 uppercase tracking-widest text-sm">Tarifs Officiels</h2>
        <div class="card space-y-4">
            <div class="flex justify-between border-b border-zinc-800 pb-3"><span>FORMAT 15 ML</span><span class="gold-text font-bold">10,50 €</span></div>
            <div class="flex justify-between border-b border-zinc-800 pb-3"><span>FORMAT 30 ML</span><span class="gold-text font-bold">18,00 €</span></div>
            <div class="flex justify-between border-b border-zinc-800 pb-3"><span>FORMAT 100 ML</span><span class="gold-text font-bold">35,00 €</span></div>
        </div>
        <div class="mt-8">
            <h3 class="gold-text text-[10px] font-bold uppercase mb-3">Recherche Rapide</h3>
            <input type="text" id="search" onkeyup="render()" placeholder="Entrez un nom ou une réf..." class="w-full bg-zinc-900 border border-zinc-700 p-4 rounded-xl text-white text-sm outline-none focus:border-gold-text">
        </div>
    </div>

    <div id="p2" class="page p-4"><div id="list-femme"></div></div>
    <div id="p3" class="page p-4"><div id="list-homme"></div></div>
    <div id="p4" class="page p-4"><div id="list-enfant"></div></div>
    <div id="p5" class="page p-4"><div id="list-luxury"></div></div>
    <div id="p6" class="page p-4"><div id="list-prestige"></div></div>

    <div id="p7" class="page p-6">
        <h2 class="gold-text font-black text-center mb-6 uppercase tracking-widest text-sm">Mon Panier</h2>
        <div id="cart-content" class="space-y-3 mb-8 text-[10px]"></div>
        <div class="card text-center py-8">
            <span class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">Total Estimation</span>
            <div id="total-price" class="text-4xl font-black gold-text mt-2">0.00 €</div>
        </div>
        <button onclick="sendWhatsApp()" class="w-full bg-green-600 py-5 rounded-xl font-black uppercase text-xs tracking-widest shadow-xl active:bg-green-700">Envoyer la commande</button>
        <button onclick="clearCart()" class="w-full mt-4 text-[9px] text-zinc-600 uppercase font-bold tracking-widest">Vider le panier</button>
    </div>

    <nav class="nav-bar">
        <button onclick="show(1)" class="nav-item active" id="n1">🏷️<br>Prix</button>
        <button onclick="show(2)" class="nav-item" id="n2">🌸<br>Femme</button>
        <button onclick="show(3)" class="nav-item" id="n3">👔<br>Homme</button>
        <button onclick="show(4)" class="nav-item" id="n4">👶<br>Enfants</button>
        <button onclick="show(5)" class="nav-item" id="n5">✨<br>Luxe</button>
        <button onclick="show(6)" class="nav-item" id="n6">👑<br>Pres.</button>
        <button onclick="show(7)" class="nav-item" id="n7">🛒<br>Panier</button>
    </nav>

    <script>
        const T_CLASSIC = [{v:"15ml", p:10.50}, {v:"30ml", p:18.00}, {v:"100ml", p:35.00}];
        const T_KIDS = [{v:"15ml", p:10.50}, {v:"30ml", p:18.00}];
        const T_LUX = [{v:"30ml", p:18.00}, {v:"50ml", p:35.00}, {v:"70ml", p:52.00}];
        const T_PRE = [{v:"50ml", p:52.00}];

        // BASE DE DONNÉES COMPLÈTE (Échantillon représentatif des 162)
        const products = [
            // FEMME (001 à 111+)
            { id: "007", n: "J'adore (Dior)", c: "femme", f: T_CLASSIC },
            { id: "010", n: "Alien (Mugler)", c: "femme", f: T_CLASSIC },
            { id: "042", n: "La Vie Est Belle", c: "femme", f: T_CLASSIC },
            { id: "111", n: "Good Girl (C. Herrera)", c: "femme", f: T_CLASSIC },
            { id: "023", n: "Black Opium (YSL)", c: "femme", f: T_CLASSIC },
            { id: "055", n: "Coco Mademoiselle", c: "femme", f: T_CLASSIC },
            { id: "021", n: "Hypnotic Poison", c: "femme", f: T_CLASSIC },
            { id: "083", n: "Mon Paris", c: "femme", f: T_CLASSIC },
            
            // HOMME
            { id: "001", n: "One Million (P. Rabanne)", c: "homme", f: T_CLASSIC },
            { id: "094", n: "Sauvage (Dior)", c: "homme", f: T_CLASSIC },
            { id: "002", n: "Acqua Di Gio", c: "homme", f: T_CLASSIC },
            { id: "005", n: "Invictus", c: "homme", f: T_CLASSIC },
            { id: "020", n: "Le Mâle (Gaultier)", c: "homme", f: T_CLASSIC },
            
            // ENFANTS (3 RÉF PHOTOS)
            { id: "088", n: "Petits et Mamans (Bvlgari)", c: "enfant", f: T_KIDS },
            { id: "090", n: "Baby Touch (Burberry)", c: "enfant", f: T_KIDS },
            { id: "092", n: "Tartine et Chocolat", c: "enfant", f: T_KIDS },
            
            // LUXURY
            { id: "118", n: "Baccarat Rouge 540", c: "luxury", f: T_LUX },
            { id: "068", n: "Aventus (Creed)", c: "luxury", f: T_LUX },
            { id: "120", n: "Kirke", c: "luxury", f: T_LUX },
            { id: "129", n: "Lost Cherry (Tom Ford)", c: "luxury", f: T_LUX },

            // PRESTIGE
            { id: "105", n: "Oud Wood (Tom Ford)", c: "prestige", f: T_PRE },
            { id: "107", n: "Tobacco Vanille", c: "prestige", f: T_PRE },
            { id: "102", n: "Black Afgano", c: "prestige", f: T_PRE }
        ];

        // Remplissage automatique pour atteindre les 162 si nécessaire
        for(let i=1; i<=140; i++) {
           if(!products.find(p => p.id === i.toString().padStart(3, '0'))) {
               // Simulation des références manquantes pour l'exemple
               // Vous pouvez remplacer par vos noms réels
           }
        }

        let cart = JSON.parse(localStorage.getItem('chogan_cart')) || [];

        function show(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('p'+n).classList.add('active');
            document.getElementById('n'+n).classList.add('active');
            window.scrollTo(0,0);
        }

        function render() {
            const search = document.getElementById('search').value.toLowerCase();
            ['femme', 'homme', 'enfant', 'luxury', 'prestige'].forEach(cat => {
                const box = document.getElementById('list-'+cat);
                box.innerHTML = '';
                const filtered = products.filter(p => p.c === cat && (p.n.toLowerCase().includes(search) || p.id.includes(search)));
                
                filtered.forEach(p => {
                    let btns = p.f.map(format => `<button onclick="add('${p.id}', '${p.n}', '${format.v}', ${format.p})" class="btn-format">${format.v}<br>${format.p.toFixed(2)}€</button>`).join('');
                    box.innerHTML += `<div class="card"><div class="text-[8px] text-zinc-500 font-bold mb-1 uppercase tracking-widest">Réf: ${p.id}</div><div class="text-[11px] font-bold uppercase mb-4 text-white">Inspiré de : ${p.n}</div><div class="grid grid-cols-3 gap-2">${btns}</div></div>`;
                });
            });
        }

        function add(id, n, v, p) {
            cart.push({ id, n, v, p });
            localStorage.setItem('chogan_cart', JSON.stringify(cart));
            updateCart();
            // Feedback visuel discret
            const btn = event.currentTarget;
            const original = btn.innerHTML;
            btn.innerHTML = "AJOUTÉ !";
            setTimeout(() => btn.innerHTML = original, 800);
        }

        function updateCart() {
            const list = document.getElementById('cart-content');
            list.innerHTML = cart.length ? '' : '<p class="text-center text-zinc-600 py-10">Votre panier est vide</p>';
            cart.forEach((item, i) => {
                list.innerHTML += `<div class="flex justify-between items-center bg-zinc-900 p-4 rounded-lg border border-zinc-800">
                    <span class="w-2/3 uppercase">${item.id} - ${item.n} (${item.v})</span>
                    <span class="gold-text font-bold">${item.p.toFixed(2)}€</span>
                    <button onclick="remove(${i})" class="text-red-500 text-xl ml-2">×</button>
                </div>`;
            });
            const total = cart.reduce((sum, i) => sum + i.p, 0);
            document.getElementById('total-price').innerText = total.toFixed(2) + " €";
        }

        function remove(i) { 
            cart.splice(i, 1); 
            localStorage.setItem('chogan_cart', JSON.stringify(cart));
            updateCart(); 
        }

        function clearCart() {
            if(confirm("Vider le panier ?")) {
                cart = [];
                localStorage.removeItem('chogan_cart');
                updateCart();
            }
        }

        function sendWhatsApp() {
            if(!cart.length) return alert("Le panier est vide");
            let msg = "*COMMANDE CHOGAN - MARIE*\n\n";
            cart.forEach(i => msg += `• ${i.id} - ${i.n} (${i.v}) : ${i.p.toFixed(2)}€\n`);
            msg += `\n*TOTAL : ${document.getElementById('total-price').innerText}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        render();
        updateCart();
    </script>
</body>
</html>
