<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGAN ELITE - MARIE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --dark-gold: #8b6508; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; }
        .chogan-font { font-family: 'Cinzel', serif; }
        
        /* Design des Cartes Luxe */
        .luxury-card { 
            background: #0a0a0a; 
            border: 1px solid var(--gold); 
            border-radius: 12px; 
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.2);
        }
        
        /* Inputs et Boutons */
        .luxury-input {
            background: #111;
            border: 1px solid var(--gold);
            color: #fff;
            border-radius: 8px;
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-gold:active { transform: scale(0.95); opacity: 0.8; }

        /* Filtres Catégories */
        .cat-btn { 
            border: 1px solid #333; 
            color: #666;
            font-size: 9px; 
            font-weight: 900; 
            padding: 8px 4px; 
            border-radius: 6px; 
            text-transform: uppercase; 
        }
        .cat-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(184, 134, 11, 0.1); }

        /* Navigation */
        .nav-btn { display: flex; flex-direction: column; align-items: center; opacity: 0.4; color: #fff; }
        .nav-btn.active { opacity: 1; color: var(--gold); }
        
        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; }

        /* Switch DA/EUR */
        .sw-opt { flex: 1; text-align: center; padding: 10px; font-size: 10px; font-weight: 900; border-radius: 6px; color: #666; cursor: pointer; }
        .sw-opt.active { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <header class="p-4 sticky top-0 bg-black z-50 border-b border-[#222] flex justify-between items-center">
        <div>
            <h1 class="chogan-font text-2xl font-bold text-white tracking-widest">CHOGAN</h1>
            <p class="text-[8px] font-black text-amber-600 uppercase italic tracking-[2px]">Luxury Management</p>
        </div>
        <div class="bg-[#111] border border-amber-600 p-2 rounded-lg">
            <span class="text-[7px] font-bold block uppercase text-amber-600 text-center mb-1">Taux DA</span>
            <input type="number" id="rate" value="245" oninput="updateAll()" class="w-10 bg-transparent text-white font-black text-center outline-none text-sm font-sans">
        </div>
    </header>

    <div id="tab1" class="tab-content active p-4">
        <input type="text" id="search" onkeyup="renderCatalog()" placeholder="RECHERCHER..." 
               class="w-full p-4 luxury-input mb-4 outline-none text-sm uppercase tracking-widest">

        <div class="grid grid-cols-4 gap-2 mb-4">
            <button onclick="setFilter('ALL')" id="filter-ALL" class="cat-btn active">Tous</button>
            <button onclick="setFilter('W')" id="filter-W" class="cat-btn">Femmes</button>
            <button onclick="setFilter('M')" id="filter-M" class="cat-btn">Hommes</button>
            <button onclick="setFilter('L')" id="filter-L" class="cat-btn">Luxury</button>
        </div>
        
        <div class="flex bg-[#111] border border-[#222] rounded-lg p-1 mb-6">
            <div id="opt-eur" onclick="setCurrency('EUR')" class="sw-opt active">EUROS (€)</div>
            <div id="opt-dzd" onclick="setCurrency('DZD')" class="sw-opt">DINARS (DA)</div>
        </div>

        <div id="grid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="tab2" class="tab-content p-4">
        <h2 class="chogan-font text-xl mb-6 text-center tracking-widest text-amber-600 border-b border-amber-900 pb-4">VOTRE SELECTION</h2>
        
        <div id="cart-list" class="space-y-4 mb-8"></div>
        
        <div class="luxury-card p-6 mb-6">
            <div class="flex justify-between items-center mb-6 text-[10px] font-black uppercase tracking-widest">
                <span class="text-gray-400">Frais de Livraison (<span class="cur-sym">€</span>)</span>
                <input type="number" id="ship" value="2.5" oninput="updateAll()" class="w-20 bg-black border-b border-amber-600 text-center text-white outline-none py-1">
            </div>
            <div class="flex justify-between items-center pt-4 border-t border-[#333]">
                <span class="font-black text-amber-600 tracking-tighter">TOTAL :</span>
                <span id="final-total" class="text-3xl font-black">0 €</span>
            </div>
        </div>

        <button onclick="generateOrder()" class="w-full btn-gold py-5 rounded-lg shadow-lg mb-4">📤 Copier pour WhatsApp</button>
        <button onclick="resetCart()" class="w-full text-gray-600 font-black uppercase text-[9px] tracking-[2px]">Vider la sélection</button>
    </div>

    <div id="tab5" class="tab-content p-4 text-center">
        <h2 class="chogan-font text-xl mb-8 tracking-widest text-amber-600">CONFIGURATION</h2>
        
        <div class="luxury-card p-8 mb-6 border-dashed">
            <p class="text-[10px] text-gray-500 mb-6 uppercase tracking-widest font-bold">Mise à jour du catalogue PDF</p>
            <input type="file" id="pdfInput" accept="application/pdf" class="hidden" onchange="handlePDF(event)">
            <button onclick="document.getElementById('pdfInput').click()" class="w-full border border-amber-600 text-amber-600 font-black py-4 rounded-lg uppercase text-[10px] hover:bg-amber-600 hover:text-black transition">
                Importer le fichier
            </button>
        </div>
        
        <button onclick="clearCatalog()" class="text-red-900 font-black uppercase text-[8px] tracking-widest">Réinitialiser la base de données</button>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 grid grid-cols-7 p-3 z-50 bg-black border-t border-[#222]">
        <button onclick="showTab(1)" id="nav1" class="nav-btn active"><span class="text-xl">🛍️</span><span class="text-[6px] font-black uppercase mt-1">Boutique</span></button>
        <button onclick="showTab(2)" id="nav2" class="nav-btn"><span class="text-xl">📜</span><span class="text-[6px] font-black uppercase mt-1">Panier</span></button>
        <button class="nav-btn opacity-10"><span class="text-xl">💎</span></button>
        <button class="nav-btn opacity-10"><span class="text-xl">📈</span></button>
        <button onclick="showTab(5)" id="nav5" class="nav-btn"><span class="text-xl">⚙️</span><span class="text-[6px] font-black uppercase mt-1">Admin</span></button>
        <button class="nav-btn opacity-10"><span class="text-xl">🎓</span></button>
        <button class="nav-btn opacity-10"><span class="text-xl">👤</span></button>
    </nav>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let currentCurrency = 'EUR';
        let currentFilter = 'ALL';
        let cart = [];
        let products = JSON.parse(localStorage.getItem('chogan_marie_db')) || [];

        // Images basées sur tes fichiers
        const imgMap = { 'W': '14856.jpg', 'M': '14859.jpg', 'L': '14833.jpg', 'DEFAULT': '14857.jpg' };

        function setFilter(cat) {
            currentFilter = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('filter-' + cat).classList.add('active');
            renderCatalog();
        }

        function setCurrency(cur) {
            currentCurrency = cur;
            document.getElementById('opt-eur').classList.toggle('active', cur === 'EUR');
            document.getElementById('opt-dzd').classList.toggle('active', cur === 'DZD');
            const rate = document.getElementById('rate').value;
            const ship = document.getElementById('ship');
            ship.value = (cur === 'EUR') ? 2.5 : Math.round(2.5 * rate);
            updateAll();
        }

        function renderCatalog() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            const rate = document.getElementById('rate').value;
            grid.innerHTML = products.length === 0 ? '<div class="col-span-2 text-center py-20 text-[#333] font-bold uppercase tracking-widest text-[10px]">Aucun produit importé</div>' : '';
            
            const filtered = products.filter(p => {
                const mSearch = p.brand.toLowerCase().includes(search) || p.id.toLowerCase().includes(search);
                const mCat = (currentFilter === 'ALL') || (p.cat === currentFilter);
                return mSearch && mCat;
            });

            filtered.forEach(p => {
                const priceText = (currentCurrency === 'EUR') ? p.price.toFixed(2) + ' €' : Math.round(p.price * rate).toLocaleString() + ' DA';
                const imgSrc = imgMap[p.cat] || imgMap['DEFAULT'];
                
                grid.innerHTML += `
                    <div class="luxury-card">
                        <img src="${imgSrc}" class="h-32 w-full object-cover grayscale-[0.2] hover:grayscale-0 transition">
                        <div class="p-4 bg-[#0a0a0a]">
                            <div class="text-[7px] text-amber-600 font-black tracking-widest mb-1 uppercase">${p.cat === 'L' ? 'Collection Luxury' : (p.cat === 'M' ? 'Homme' : 'Femme')}</div>
                            <h3 class="text-[10px] font-bold text-white uppercase truncate mb-1 tracking-tighter">${p.brand}</h3>
                            <p class="text-[12px] font-black text-white mb-4 tracking-widest">${priceText}</p>
                            <button onclick="addToCart('${p.brand}', ${p.price})" class="w-full btn-gold py-2 rounded text-[9px]">Choisir</button>
                        </div>
                    </div>`;
            });
        }

        function generateOrder() {
            if(cart.length === 0) return;
            const rate = document.getElementById('rate').value;
            const shipVal = parseFloat(document.getElementById('ship').value) || 0;
            const cur = currentCurrency === 'EUR' ? '€' : 'DA';
            
            let text = `📦 *COMMANDE CHOGAN - MARIE*\n---\n`;
            cart.forEach(i => {
                const p = (currentCurrency === 'EUR') ? i.price.toFixed(2) + ' €' : Math.round(i.price * rate) + ' DA';
                text += `• ${i.brand} : ${p}\n`;
            });
            text += `• Livraison : ${shipVal.toLocaleString()} ${cur}\n`;
            text += `---\n*TOTAL FINAL : ${document.getElementById('final-total').innerText}*`;
            
            navigator.clipboard.writeText(text);
            alert("Bon de commande copié !");
        }

        // --- Fonctions PDF & Core ---
        async function handlePDF(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(item => item.str).join(" ") + "\n";
                }
                extractData(fullText);
            };
            reader.readAsArrayBuffer(file);
        }

        function extractData(text) {
            const regex = /(\d+[A-Z]*)\.\s+([A-Za-z\s']+)\s+.*?\s+(\d+[A-Z]*[-]*70ml|70ml|50ml)\s*[-]*\s*(\d+,\d+)\s*€/gi;
            let match; const newProducts = [];
            while ((match = regex.exec(text)) !== null) {
                const id = match[1]; const price = parseFloat(match[4].replace(',', '.'));
                let cat = id.includes('M') ? 'M' : (price > 40 ? 'L' : 'W');
                newProducts.push({ id, brand: match[2].trim(), price, cat });
            }
            if (newProducts.length > 0) {
                products = newProducts; localStorage.setItem('chogan_marie_db', JSON.stringify(products));
                updateAll(); showTab(1);
            }
        }

        function addToCart(brand, price) { cart.push({brand, price}); updateAll(); showTab(2); }
        function remove(i) { cart.splice(i, 1); updateAll(); }
        function resetCart() { cart = []; updateAll(); }
        function clearCatalog() { products = []; localStorage.removeItem('chogan_marie_db'); updateAll(); }

        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav' + n).classList.add('active');
            window.scrollTo(0,0);
        }

        function updateAll() {
            renderCatalog();
            const list = document.getElementById('cart-list');
            const rate = document.getElementById('rate').value;
            list.innerHTML = cart.length ? '' : '<div class="text-center py-10 font-bold opacity-20">AUCUN PRODUIT</div>';
            cart.forEach((item, i) => {
                const p = (currentCurrency === 'EUR') ? item.price.toFixed(2) + ' €' : Math.round(item.price * rate).toLocaleString() + ' DA';
                list.innerHTML += `<div class="flex justify-between items-center p-5 border border-amber-900 rounded-lg bg-[#050505]">
                    <div class="text-[10px] font-black uppercase text-white">${item.brand}</div>
                    <div class="text-[10px] font-black text-amber-600">${p} <button onclick="remove(${i})" class="ml-4 text-red-900 text-lg">×</button></div>
                </div>`;
            });
            const ship = parseFloat(document.getElementById('ship').value) || 0;
            const sub = cart.reduce((s, i) => s + i.price, 0);
            document.querySelectorAll('.cur-sym').forEach(el => el.innerText = (currentCurrency === 'EUR' ? '€' : 'DA'));
            if (currentCurrency === 'EUR') { document.getElementById('final-total').innerText = (sub + ship).toFixed(2) + " €"; }
            else { document.getElementById('final-total').innerText = Math.round((sub * rate) + ship).toLocaleString() + " DA"; }
        }
        updateAll();
    </script>
</body>
</html>
