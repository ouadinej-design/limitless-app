<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGAN ELITE - STABLE WHITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; margin: 0; }
        .chogan-font { font-family: 'Cinzel', serif; }
        .product-card { background: #ffffff; border: 1px solid #f3f3f3; border-radius: 20px; transition: transform 0.2s; }
        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; }
        .gold-gradient { background: linear-gradient(135deg, #b8860b 0%, #d4af37 100%); color: white; }
        
        /* Switch Devise */
        .switch-container { background: #f0f0f0; border-radius: 50px; position: relative; display: flex; cursor: pointer; width: 200px; margin: 0 auto; border: 2px solid #f0f0f0; }
        .switch-option { flex: 1; text-align: center; padding: 8px 0; font-size: 10px; font-weight: 900; z-index: 2; color: #999; transition: 0.3s; }
        .switch-option.active { color: white; }
        .switch-slider { position: absolute; width: 50%; height: 100%; background: #1a1a1a; border-radius: 50px; transition: 0.3s ease; z-index: 1; }
        .currency-dzd .switch-slider { transform: translateX(100%); background: var(--gold); }

        /* Filtres */
        .cat-btn { padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; border: 1px solid #eee; color: #999; white-space: nowrap; }
        .cat-btn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <header class="p-4 sticky top-0 bg-white/95 z-50 border-b border-gray-50 flex justify-between items-center">
            <div>
                <h1 class="chogan-font text-lg tracking-widest">CHOGAN</h1>
                <p class="text-[7px] uppercase text-gray-400 font-bold">Elite Marie Portfolio</p>
            </div>
            <div class="bg-gray-50 px-2 py-1 rounded-lg border border-gray-100 flex items-center space-x-1">
                <span class="text-[7px] font-black text-gray-400">TAUX :</span>
                <input type="number" id="rate" value="240" onchange="renderCatalog()" class="w-8 bg-transparent text-[10px] font-black outline-none text-amber-800 text-center">
            </div>
        </header>

        <div id="tab1" class="tab-content active p-4">
            <input type="text" id="search" onkeyup="renderCatalog()" placeholder="Rechercher Ref, Nom..." 
                   class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none mb-4">
            
            <div id="currency-switch" class="switch-container mb-6" onclick="toggleCurrency()">
                <div class="switch-slider" id="slider"></div>
                <div id="opt-eur" class="switch-option active">EUROS (€)</div>
                <div id="opt-dzd" class="switch-option">DINARS (DA)</div>
            </div>

            <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6">
                <button onclick="setCategory('all')" class="cat-btn active" id="btn-all">TOUT</button>
                <button onclick="setCategory('Luxury')" class="cat-btn" id="btn-Luxury">LUXURY</button>
                <button onclick="setCategory('Femme')" class="cat-btn" id="btn-Femme">FEMME</button>
                <button onclick="setCategory('Homme')" class="cat-btn" id="btn-Homme">HOMME</button>
            </div>

            <div id="grid" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div id="tab2" class="tab-content p-4">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-black italic">PANIER</h2>
                <button onclick="resetCart()" class="text-[9px] font-bold text-red-400 border border-red-100 px-3 py-1 rounded-full uppercase">Reset</button>
            </div>
            <div id="cart-list" class="space-y-2 mb-6"></div>
            <div class="bg-gray-50 p-6 rounded-[2.5rem] border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-gray-400 uppercase">Total</span>
                    <span id="final-total" class="text-2xl font-black">0.00 €</span>
                </div>
                <div id="ship-box" class="flex justify-between items-center text-[10px] font-bold pt-4 border-t border-gray-200">
                    <span>LIVRAISON (DA)</span>
                    <input type="number" id="ship" value="600" onchange="calcTotal()" class="w-14 text-right bg-white border border-gray-100 rounded p-1 outline-none text-amber-800">
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 grid grid-cols-7 p-2 z-50 bg-white border-t border-gray-100">
            <button onclick="showTab(1)" class="flex flex-col items-center py-2"><span class="text-xl">🛍️</span><span class="text-[6px] mt-1 font-bold">SHOP</span></button>
            <button onclick="showTab(2)" class="flex flex-col items-center py-2"><span class="text-xl">📋</span><span class="text-[6px] mt-1 font-bold">ORDRE</span></button>
            <button onclick="showTab(3)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">💎</span><span class="text-[6px] mt-1 font-bold">CLUB</span></button>
            <button onclick="showTab(4)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">📈</span><span class="text-[6px] mt-1 font-bold">GOAL</span></button>
            <button onclick="showTab(5)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">📢</span><span class="text-[6px] mt-1 font-bold">NEWS</span></button>
            <button onclick="showTab(6)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">🏛️</span><span class="text-[6px] mt-1 font-bold">LEARN</span></button>
            <button onclick="showTab(7)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">👤</span><span class="text-[6px] mt-1 font-bold">ME</span></button>
        </nav>
    </div>

    <script>
        let currentCurrency = 'EUR';
        let currentCategory = 'all';
        let cart = [];

        const products = [
            { id: '118', type: 'Luxury', name: 'Baccarat Rouge 540', price: 52 },
            { id: '127', type: 'Luxury', name: 'Oud Wood', price: 52 },
            { id: '139', type: 'Luxury', name: 'Les Sables Roses', price: 65 },
            { id: '042', type: 'Femme', name: 'La Vie est Belle', price: 35 },
            { id: '055', type: 'Femme', name: 'Black Opium', price: 35 },
            { id: '038', type: 'Homme', name: 'Bleu de Chanel', price: 35 },
            { id: '068', type: 'Homme', name: 'Aventus Creed', price: 57 }
        ];

        function toggleCurrency() {
            currentCurrency = (currentCurrency === 'EUR') ? 'DZD' : 'EUR';
            document.getElementById('currency-switch').classList.toggle('currency-dzd');
            document.getElementById('opt-eur').classList.toggle('active');
            document.getElementById('opt-dzd').classList.toggle('active');
            renderCatalog();
            calcTotal();
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            renderCatalog();
        }

        function renderCatalog() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            const rate = document.getElementById('rate').value;
            grid.innerHTML = '';

            const filtered = products.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search) || p.id.includes(search);
                const matchCat = currentCategory === 'all' || p.type === currentCategory;
                return matchSearch && matchCat;
            });

            filtered.forEach(p => {
                const price = (currentCurrency === 'EUR') ? p.price + ' €' : Math.round(p.price * rate) + ' DA';
                grid.innerHTML += `
                    <div class="product-card p-4 flex flex-col justify-between shadow-sm">
                        <img src="https://www.chogangroup.com/img/products/${p.id}.jpg" class="h-20 object-contain mb-2" onerror="this.src='https://via.placeholder.com/80?text=${p.id}'">
                        <p class="text-[7px] font-bold text-gray-300 uppercase">${p.type} | REF ${p.id}</p>
                        <h3 class="text-[9px] font-black uppercase h-6 overflow-hidden">${p.name}</h3>
                        <p class="text-[12px] font-black mt-2">${price}</p>
                        <button onclick="addToCart('${p.name}', ${p.price})" class="gold-gradient w-full py-2 rounded-xl text-[8px] font-black uppercase mt-3">Ajouter</button>
                    </div>`;
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            renderCart();
            showTab(2);
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const rate = document.getElementById('rate').value;
            list.innerHTML = cart.length ? '' : '<div class="py-10 text-center text-gray-200 text-xs italic">Vide</div>';
            cart.forEach((item, i) => {
                const p = (currentCurrency === 'EUR') ? item.price + ' €' : Math.round(item.price * rate) + ' DA';
                list.innerHTML += `<div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100 text-[9px] font-black uppercase"><span>${item.name}</span><div class="flex items-center space-x-3"><span>${p}</span><button onclick="remove(${i})" class="text-gray-300">✕</button></div></div>`;
            });
            calcTotal();
        }

        function calcTotal() {
            const rate = document.getElementById('rate').value;
            const ship = (currentCurrency === 'DZD') ? parseFloat(document.getElementById('ship').value) || 0 : 0;
            const sub = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('ship-box').style.display = (currentCurrency === 'DZD') ? 'flex' : 'none';
            const total = (currentCurrency === 'EUR') ? sub.toFixed(2) + " €" : Math.round((sub * rate) + ship).toLocaleString() + " DA";
            document.getElementById('final-total').innerText = total;
        }

        function remove(i) { cart.splice(i, 1); renderCart(); }
        function resetCart() { cart = []; renderCart(); }
        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('opacity-100', i+1===n));
            document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('opacity-30', i+1!==n));
        }

        renderCatalog();
    </script>
</body>
</html>
