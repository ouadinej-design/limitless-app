<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGAN ELITE - RECHERCHE & PAIEMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; margin: 0; }
        .chogan-font { font-family: 'Cinzel', serif; }
        .product-card { background: #ffffff; border: 1px solid #f3f3f3; border-radius: 20px; transition: transform 0.2s; }
        .product-card:active { transform: scale(0.98); }
        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .gold-btn { background: linear-gradient(135deg, #b8860b 0%, #d4af37 100%); color: white; }
        .search-bar { background: #f8f8f8; border: 1px solid #eee; border-radius: 15px; }
        nav { background: rgba(255, 255, 255, 0.98); border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <header class="p-4 sticky top-0 bg-white/95 z-50 border-b border-gray-50 flex justify-between items-center">
            <div>
                <h1 class="chogan-font text-lg tracking-[0.2em]">CHOGAN</h1>
                <p class="text-[7px] uppercase tracking-widest text-gray-400 font-bold">Elite Marie</p>
            </div>
            <div class="flex items-center space-x-2 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100">
                <span class="text-[8px] font-black text-gray-400 uppercase">Taux DA</span>
                <input type="number" id="rate" value="240" onchange="renderCatalog()" class="w-8 bg-transparent text-xs font-black outline-none text-amber-800 text-center">
            </div>
        </header>

        <div id="tab1" class="tab-content active p-4">
            <div class="mb-6">
                <input type="text" id="search" onkeyup="renderCatalog()" placeholder="Rechercher Ref, Nom, Senteur..." 
                       class="search-bar w-full p-4 text-sm outline-none focus:ring-1 ring-amber-500/20">
            </div>

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-black italic uppercase">Catalogue</h2>
                <button onclick="location.reload()" class="text-[9px] font-bold text-gray-300 border border-gray-100 px-3 py-1 rounded-full">RESET SHOP</button>
            </div>

            <div id="grid" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div id="tab2" class="tab-content p-4">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-black italic">MA COMMANDE</h2>
                <button onclick="resetCart()" class="text-[9px] font-bold text-red-400 border border-red-100 px-3 py-1 rounded-full">VIDER</button>
            </div>
            
            <div id="cart-list" class="space-y-2 mb-6"></div>
            
            <div class="bg-gray-50 p-6 rounded-[2.5rem] border border-gray-100 space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Total en Euros</span>
                    <span id="total-eur" class="text-xl font-black text-gray-800">0.00 €</span>
                </div>
                <div class="flex justify-between items-center text-[10px] font-bold">
                    <span>LIVRAISON (DA)</span>
                    <input type="number" id="ship" value="600" onchange="calcTotal()" class="w-16 text-right bg-white border border-gray-100 rounded-lg p-1 outline-none">
                </div>
                <div class="border-t border-gray-200 pt-4 flex justify-between items-end">
                    <span class="font-black text-sm italic uppercase">Conversion DA</span>
                    <span id="total-da" class="text-3xl font-black text-amber-900">0 DA</span>
                </div>
            </div>
            <button class="gold-btn w-full p-5 rounded-2xl mt-6 text-xs font-black uppercase tracking-widest shadow-lg shadow-amber-200">Valider le paiement</button>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 grid grid-cols-7 p-2 z-50">
            <button onclick="showTab(1)" class="flex flex-col items-center py-2"><span class="text-xl">🛍️</span><span class="text-[6px] mt-1 font-bold uppercase">Shop</span></button>
            <button onclick="showTab(2)" class="flex flex-col items-center py-2"><span class="text-xl">📜</span><span class="text-[6px] mt-1 font-bold uppercase">Ordre</span></button>
            <button onclick="showTab(3)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">💎</span><span class="text-[6px] mt-1 font-bold uppercase">Club</span></button>
            <button onclick="showTab(4)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">📈</span><span class="text-[6px] mt-1 font-bold uppercase">Goal</span></button>
            <button onclick="showTab(5)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">📢</span><span class="text-[6px] mt-1 font-bold uppercase">News</span></button>
            <button onclick="showTab(6)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">🏛️</span><span class="text-[6px] mt-1 font-bold uppercase">Learn</span></button>
            <button onclick="showTab(7)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">👤</span><span class="text-[6px] mt-1 font-bold uppercase">Me</span></button>
        </nav>
    </div>

    <script>
        const products = [
            // LUXURY (Inspirations basées sur vos photos)
            { id: '118', name: 'Baccarat Rouge 540', scent: 'Ambré Floral - Maison Francis Kurkdjian', price: 52 },
            { id: '127', name: 'Oud Wood', scent: 'Boisé Oriental - Tom Ford', price: 52 },
            { id: '126', name: 'Soleil Blanc', scent: 'Floral Ambré - Tom Ford', price: 52 },
            { id: '129', name: 'Erba Pura', scent: 'Fruité - Sospiro', price: 52 },
            { id: '139', name: 'Les Sables Roses', scent: 'Oriental Floral - Louis Vuitton', price: 65 },
            { id: '068', name: 'Aventus', scent: 'Chypré Fruité - Creed', price: 57 },
            // CLASSIQUES
            { id: '038', name: 'Bleu', scent: 'Boisé Aromatique - Chanel', price: 35 },
            { id: '055', name: 'Black Opium', scent: 'Oriental Vanillé - YSL', price: 35 },
            { id: '042', name: 'La Vie est Belle', scent: 'Floral Fruité - Lancôme', price: 35 },
            { id: '001', name: 'One Million', scent: 'Boisé Épicé - Paco Rabanne', price: 35 },
            { id: '110', name: 'Kirke', scent: 'Chypré Fruité - Tiziana Terenzi', price: 48 },
            { id: '030', name: 'Le Mâle', scent: 'Oriental Fougère - Jean Paul Gaultier', price: 35 }
            // Ajoutez ici les autres parmi les 50 produits...
        ];

        let cart = [];

        function renderCatalog() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            const rate = document.getElementById('rate').value;
            grid.innerHTML = '';

            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(search) || 
                p.id.includes(search) || 
                p.scent.toLowerCase().includes(search)
            );

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card p-4 flex flex-col justify-between shadow-sm">
                        <div class="h-28 bg-white flex items-center justify-center mb-3">
                            <img src="https://www.chogangroup.com/img/products/${p.id}.jpg" 
                                 onerror="this.src='https://via.placeholder.com/100/ffffff/b8860b?text=${p.id}'"
                                 class="max-h-24 object-contain">
                        </div>
                        <p class="text-[7px] font-black text-gray-300 uppercase">REF ${p.id}</p>
                        <h3 class="text-[10px] font-black leading-tight h-8 overflow-hidden uppercase">${p.name}</h3>
                        <p class="text-[8px] text-gray-400 italic mb-2 truncate">${p.scent}</p>
                        <div class="flex flex-col mb-3">
                            <span class="text-[9px] font-bold text-gray-400">${p.price.toFixed(2)} €</span>
                            <span class="text-sm font-black text-amber-900">${Math.round(p.price * rate)} DA</span>
                        </div>
                        <button onclick="addToCart('${p.name}', ${p.price})" class="gold-btn w-full py-2 rounded-xl text-[9px] font-bold uppercase">Ajouter</button>
                    </div>
                `;
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            renderCart();
            showTab(2);
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.length ? '' : '<div class="py-12 text-center text-gray-200 text-xs italic">Aucun article sélectionné</div>';
            cart.forEach((item, i) => {
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <div class="text-[9px] font-black uppercase">${item.name}</div>
                        <div class="flex items-center space-x-4">
                            <span class="text-xs font-bold text-amber-800">${item.price.toFixed(2)} €</span>
                            <button onclick="remove(${i})" class="text-gray-300">✕</button>
                        </div>
                    </div>
                `;
            });
            calcTotal();
        }

        function calcTotal() {
            const rate = document.getElementById('rate').value;
            const ship = parseFloat(document.getElementById('ship').value) || 0;
            const sub = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('total-eur').innerText = sub.toFixed(2) + " €";
            document.getElementById('total-da').innerText = Math.round((sub * rate) + ship).toLocaleString() + " DA";
        }

        function remove(i) { cart.splice(i, 1); renderCart(); }
        function resetCart() { if(confirm("Vider le panier ?")) { cart = []; renderCart(); } }

        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('opacity-100', i+1===n));
            document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('opacity-30', i+1!==n));
        }

        renderCatalog();
    </script>
</body>
</html>
