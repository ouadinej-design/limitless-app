<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGAN ELITE - CATALOGUE COMPLET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; margin: 0; }
        .chogan-font { font-family: 'Cinzel', serif; }
        
        /* Fiche Produit Premium */
        .product-card { 
            background: #ffffff; 
            border: 1.5px solid #f9f4e8; /* Bordure dorée très claire */
            border-radius: 20px; 
            padding: 15px;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.05);
        }

        /* Badge photo manquante */
        .no-img-placeholder {
            height: 100px;
            background: linear-gradient(135deg, #fdfbf7 0%, #f5efdf 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--gold);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 10px;
            font-weight: bold;
        }

        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .gold-gradient { background: linear-gradient(135deg, #b8860b 0%, #d4af37 100%); color: white; }
        
        /* Switch Devise */
        .switch-container { background: #fdfaf2; border: 1px solid #eee; border-radius: 50px; position: relative; display: flex; cursor: pointer; width: 220px; margin: 0 auto; }
        .switch-option { flex: 1; text-align: center; padding: 10px 0; font-size: 10px; font-weight: 900; z-index: 2; color: #b8860b; }
        .switch-option.active { color: white; }
        .switch-slider { position: absolute; width: 50%; height: 100%; background: #1a1a1a; border-radius: 50px; transition: 0.3s ease; z-index: 1; }
        .currency-dzd .switch-slider { transform: translateX(100%); background: var(--gold); }

        .cat-btn { padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; border: 1px solid #f0f0f0; color: #ccac00; background: #fff; }
        .cat-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <header class="p-6 sticky top-0 bg-white/95 z-50 border-b border-yellow-50 flex justify-between items-center">
            <div onclick="location.reload()" class="cursor-pointer">
                <h1 class="chogan-font text-xl tracking-[0.2em] text-amber-900">CHOGAN</h1>
                <p class="text-[8px] uppercase tracking-widest text-amber-600 font-black">Elite Luxury Marie</p>
            </div>
            <div class="bg-amber-50 px-3 py-1.5 rounded-full border border-amber-100 flex items-center space-x-2">
                <span class="text-[9px] font-black text-amber-800 uppercase">Taux DA</span>
                <input type="number" id="rate" value="240" onchange="renderCatalog()" class="w-8 bg-transparent text-xs font-black outline-none text-amber-900 text-center">
            </div>
        </header>

        <div id="tab1" class="tab-content active p-4">
            <div class="space-y-4 mb-8">
                <div class="relative">
                    <input type="text" id="search" onkeyup="renderCatalog()" placeholder="Rechercher une marque, un code ou une note..." 
                           class="w-full p-5 bg-white border-2 border-amber-50 rounded-2xl text-sm outline-none focus:border-amber-200 transition-all shadow-sm">
                </div>
                
                <div id="currency-switch" class="switch-container" onclick="toggleCurrency()">
                    <div class="switch-slider" id="slider"></div>
                    <div id="opt-eur" class="switch-option active">MODE EUROS (€)</div>
                    <div id="opt-dzd" class="switch-option">MODE DINARS (DA)</div>
                </div>
            </div>

            <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6">
                <button onclick="setCategory('all')" class="cat-btn active" id="btn-all">TOUS LES PARFUMS</button>
                <button onclick="setCategory('Luxury')" class="cat-btn" id="btn-Luxury">GAMME LUXURY</button>
                <button onclick="setCategory('Femme')" class="cat-btn" id="btn-Femme">POUR ELLE</button>
                <button onclick="setCategory('Homme')" class="cat-btn" id="btn-Homme">POUR LUI</button>
            </div>

            <div id="grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="tab2" class="tab-content p-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="chogan-font text-xl text-amber-900">VOTRE COMMANDE</h2>
                <button onclick="resetCart()" class="text-[10px] font-bold text-red-500 border border-red-100 px-4 py-2 rounded-full bg-red-50 uppercase">Vider</button>
            </div>
            <div id="cart-list" class="space-y-3 mb-8"></div>
            <div class="bg-amber-50 p-6 rounded-[2.5rem] border border-amber-100 shadow-inner">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[11px] font-black text-amber-700 uppercase">Total Final</span>
                    <span id="final-total" class="text-3xl font-black text-amber-900">0.00 €</span>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 grid grid-cols-7 p-3 z-50 bg-white border-t border-amber-50 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
            <button onclick="showTab(1)" class="flex flex-col items-center py-2"><span class="text-xl">🛍️</span><span class="text-[7px] mt-1 font-black text-amber-900">SHOP</span></button>
            <button onclick="showTab(2)" class="flex flex-col items-center py-2"><span class="text-xl">📜</span><span class="text-[7px] mt-1 font-black text-amber-900">ORDRE</span></button>
            <button onclick="showTab(3)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">💎</span><span class="text-[7px] mt-1 font-black">CLUB</span></button>
            <button onclick="showTab(4)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">📈</span><span class="text-[7px] mt-1 font-black">GOAL</span></button>
            <button onclick="showTab(5)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">📢</span><span class="text-[7px] mt-1 font-black">NEWS</span></button>
            <button onclick="showTab(6)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">🏛️</span><span class="text-[7px] mt-1 font-black">LEARN</span></button>
            <button onclick="showTab(7)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">👤</span><span class="text-[7px] mt-1 font-black">ME</span></button>
        </nav>
    </div>

    <script>
        let currentCurrency = 'EUR';
        let currentCategory = 'all';
        let cart = [];

        // BASE DE DONNÉES COMPLÈTE (Extraite de vos PDF)
        const products = [
            // LUXURY
            { id: '118', type: 'Luxury', brand: 'Inspiration: Baccarat Rouge', name: 'Maison Francis K.', price: 52 },
            { id: '127', type: 'Luxury', brand: 'Inspiration: Oud Wood', name: 'Tom Ford', price: 52 },
            { id: '139', type: 'Luxury', brand: 'Inspiration: Les Sables Roses', name: 'Louis Vuitton', price: 65 },
            { id: '126', type: 'Luxury', brand: 'Inspiration: Soleil Blanc', name: 'Tom Ford', price: 52 },
            { id: '110', type: 'Luxury', brand: 'Inspiration: Kirke', name: 'Tiziana Terenzi', price: 48 },
            { id: '131', type: 'Luxury', brand: 'Inspiration: Good Girl G.B.', name: 'By Kilian', price: 52 },
            // FEMME
            { id: '042', type: 'Femme', brand: 'Inspiration: La Vie est Belle', name: 'Lancôme', price: 35 },
            { id: '055', type: 'Femme', brand: 'Inspiration: Black Opium', name: 'YSL', price: 35 },
            { id: '007', type: 'Femme', brand: 'Inspiration: J’adore', name: 'Dior', price: 35 },
            { id: '023', type: 'Femme', brand: 'Inspiration: Hypnotic Poison', name: 'Dior', price: 35 },
            { id: '019', type: 'Femme', brand: 'Inspiration: Lady Million', name: 'Paco Rabanne', price: 35 },
            { id: '003', type: 'Femme', brand: 'Inspiration: Hypnôse', name: 'Lancôme', price: 35 },
            // HOMME
            { id: '038', type: 'Homme', brand: 'Inspiration: Bleu de Chanel', name: 'Chanel', price: 35 },
            { id: '001', type: 'Homme', brand: 'Inspiration: One Million', name: 'Paco Rabanne', price: 35 },
            { id: '068', type: 'Homme', brand: 'Inspiration: Aventus', name: 'Creed', price: 57 },
            { id: '061', type: 'Homme', brand: 'Inspiration: Sauvage', name: 'Dior', price: 35 },
            { id: '074', type: 'Homme', brand: 'Inspiration: Stronger with You', name: 'Armani', price: 35 },
            { id: '150', type: 'Homme', brand: 'Inspiration: Boss Bottled', name: 'Hugo Boss', price: 35 }
        ];

        function toggleCurrency() {
            currentCurrency = (currentCurrency === 'EUR') ? 'DZD' : 'EUR';
            document.getElementById('currency-switch').classList.toggle('currency-dzd');
            document.getElementById('opt-eur').classList.toggle('active');
            document.getElementById('opt-dzd').classList.toggle('active');
            renderCatalog();
            calcTotal();
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            renderCatalog();
        }

        function renderCatalog() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            const rate = document.getElementById('rate').value;
            grid.innerHTML = '';

            const filtered = products.filter(p => {
                const matchSearch = p.brand.toLowerCase().includes(search) || p.name.toLowerCase().includes(search) || p.id.includes(search);
                const matchCat = currentCategory === 'all' || p.type === currentCategory;
                return matchSearch && matchCat;
            });

            filtered.forEach(p => {
                const priceLabel = (currentCurrency === 'EUR') ? p.price + ' €' : Math.round(p.price * rate).toLocaleString() + ' DA';
                grid.innerHTML += `
                    <div class="product-card flex flex-col justify-between">
                        <div class="no-img-placeholder mb-3">
                            <span class="chogan-font">CHOGAN LUXE</span>
                        </div>
                        <p class="text-[8px] font-black text-amber-500 uppercase tracking-tighter mb-1">REF: ${p.id} • ${p.type}</p>
                        <h3 class="text-[10px] font-black uppercase text-amber-900 leading-tight mb-0.5">${p.brand}</h3>
                        <p class="text-[8px] font-bold text-gray-400 italic mb-3">${p.name}</p>
                        <div class="flex flex-col">
                            <span class="text-[13px] font-black text-black">${priceLabel}</span>
                        </div>
                        <button onclick="addToCart('${p.brand}', ${p.price})" class="gold-gradient w-full py-2.5 rounded-xl text-[9px] font-black uppercase mt-3 shadow-md active:scale-95 transition-transform">Ajouter</button>
                    </div>`;
            });
        }

        function addToCart(brand, price) {
            cart.push({brand, price});
            renderCart();
            showTab(2);
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const rate = document.getElementById('rate').value;
            list.innerHTML = cart.length ? '' : '<div class="py-20 text-center text-amber-200 text-xs italic font-bold">VOTRE PANIER EST VIDE</div>';
            cart.forEach((item, i) => {
                const p = (currentCurrency === 'EUR') ? item.price + ' €' : Math.round(item.price * rate) + ' DA';
                list.innerHTML += `
                    <div class="flex justify-between items-center p-5 bg-white border border-amber-100 rounded-2xl shadow-sm">
                        <div class="flex flex-col"><span class="text-[10px] font-black text-amber-900 uppercase">${item.brand}</span><span class="text-[9px] font-bold text-amber-600">${p}</span></div>
                        <button onclick="remove(${i})" class="text-amber-200 hover:text-red-500 text-xl font-bold">✕</button>
