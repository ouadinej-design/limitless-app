<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGAN ELITE - FILTRAGE PAR TYPE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; margin: 0; }
        .chogan-font { font-family: 'Cinzel', serif; }
        .product-card { background: #ffffff; border: 1px solid #f3f3f3; border-radius: 20px; transition: transform 0.2s; }
        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .gold-gradient { background: linear-gradient(135deg, #b8860b 0%, #d4af37 100%); }
        
        /* Switch Devise */
        .switch-container { background: #f0f0f0; border-radius: 50px; position: relative; display: flex; cursor: pointer; border: 2px solid #f0f0f0; width: 180px; margin: 0 auto; }
        .switch-option { flex: 1; text-align: center; padding: 6px 0; font-size: 9px; font-weight: 900; z-index: 2; transition: color 0.3s; color: #999; }
        .switch-option.active { color: white; }
        .switch-slider { position: absolute; width: 50%; height: 100%; background: #1a1a1a; border-radius: 50px; transition: transform 0.3s ease; z-index: 1; }
        .currency-dzd .switch-slider { transform: translateX(100%); background: var(--gold); }

        /* Filtres Catégories */
        .cat-btn { padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; border: 1px solid #eee; white-space: nowrap; transition: 0.3s; color: #999; }
        .cat-btn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <header class="p-4 sticky top-0 bg-white/95 z-50 border-b border-gray-50 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="chogan-font text-lg tracking-[0.2em]">CHOGAN</h1>
                <p class="text-[7px] uppercase tracking-widest text-gray-400 font-bold italic">Marie Portfolio</p>
            </div>
            <div class="bg-gray-50 px-2 py-1 rounded-lg border border-gray-100 flex items-center space-x-1">
                <span class="text-[7px] font-black text-gray-400">DA/€ :</span>
                <input type="number" id="rate" value="240" onchange="renderAll()" class="w-8 bg-transparent text-[10px] font-black outline-none text-amber-800 text-center">
            </div>
        </header>

        <div id="tab1" class="tab-content active p-4">
            <div class="space-y-4 mb-6">
                <input type="text" id="search" onkeyup="renderCatalog()" placeholder="Rechercher par code, nom ou senteur..." 
                       class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none">
                
                <div id="currency-switch" class="switch-container" onclick="toggleCurrency()">
                    <div class="switch-slider" id="slider"></div>
                    <div class="switch-option active" id="opt-eur">EUROS (€)</div>
                    <div class="switch-option" id="opt-dzd">DINARS (DA)</div>
                </div>
            </div>

            <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 pb-2">
                <button onclick="setCategory('all')" class="cat-btn active" id="btn-all">TOUT</button>
                <button onclick="setCategory('Luxury')" class="cat-btn" id="btn-Luxury">LUXURY</button>
                <button onclick="setCategory('Femme')" class="cat-btn" id="btn-Femme">FEMME</button>
                <button onclick="setCategory('Homme')" class="cat-btn" id="btn-Homme">HOMME</button>
            </div>

            <div id="grid" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div id="tab2" class="tab-content p-4">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-black italic">MON BON DE COMMANDE</h2>
                <button onclick="resetCart()" class="text-[9px] font-bold text-red-400 border border-red-500/20 px-3 py-1 rounded-full uppercase">Reset</button>
            </div>
            <div id="cart-list" class="space-y-2 mb-6"></div>
            <div class="bg-gray-50 p-6 rounded-[2.5rem] border border-gray-100 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-gray-400 uppercase">Total à régler</span>
                    <span id="final-total" class="text-2xl font-black text-gray-900">0.00 €</span>
                </div>
                <div id="shipping-box" class="flex justify-between items-center text-[10px] font-bold pt-4 border-t border-gray-100">
                    <span>LIVRAISON (DA)</span>
                    <input type="number" id="ship" value="600" onchange="calcTotal()" class="w-14 text-right bg-white border border-gray-100 rounded p-1 outline-none text-amber-800">
                </div>
            </div>
            <button class="gold-gradient w-full p-5 rounded-2xl mt-6 text-xs font-black uppercase text-white shadow-lg">Finaliser la vente</button>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 grid grid-cols-7 p-2 z-50 bg-white border-t border-gray-100">
            <button onclick="showTab(1)" class="flex flex-col items-center py-2"><span class="text-lg">🛍️</span><span class="text-[6px] mt-1 font-bold">SHOP</span></button>
            <button onclick="showTab(2)" class="flex flex-col items-center py-2"><span class="text-lg">📜</span><span class="text-[6px] mt-1 font-bold">ORDRE</span></button>
            <button onclick="showTab(3)" class="flex flex-col items-center py-2 opacity-30"><span class="text-lg">💎</span><span class="text-[6px] mt-1 font-bold">CLUB</span></button>
            <button onclick="showTab(4)" class="flex flex-col items-center py-2 opacity-30"><span class="text-lg">📈</span><span class="text-[6px] mt-1 font-bold">GOAL</span></button>
            <button onclick="showTab(5)" class="flex flex-col items-center py-2 opacity-30"><span class="text-lg">📢</span><span class="text-[6px] mt-1 font-bold">NEWS</span></button>
            <button onclick="showTab(6)" class="flex flex-col items-center py-2 opacity-30"><span class="text-lg">🏛️</span><span class="text-[6px] mt-1 font-bold">LEARN</span></button>
            <button onclick="showTab(7)" class="flex flex-col items-center py-2 opacity-30"><span class="text-lg">👤</span><span class="text-[6px] mt-1 font-bold">ME</span></button>
        </nav>
    </div>

    <script>
        let currentCurrency = 'EUR';
        let currentCategory = 'all';
        
        // Base de données structurée par TYPES (Basée sur vos listes)
        const products = [
            // LUXURY
            { id: '118', type: 'Luxury', name: 'Baccarat Rouge 540', scent: 'Floral Ambré', price: 52 },
            { id: '127', type: 'Luxury', name: 'Oud Wood', scent: 'Boisé Oriental', price: 52 },
            { id: '139', type: 'Luxury', name: 'Les Sables Roses', scent: 'Rose/Oud', price: 65 },
            { id: '110', type: 'Luxury', name: 'Kirke', scent: 'Fruité', price: 48 },
            // FEMME
            { id: '042', type: 'Femme', name: 'La Vie est Belle', scent: 'Floral Fruité', price: 35 },
            { id: '055', type: 'Femme', name: 'Black Opium', scent: 'Café Floral', price: 35 },
            { id: '007', type: 'Femme', name: 'J’adore', scent: 'Floral', price: 35 },
            { id: '023', type: 'Femme', name: 'Hypnotic Poison', scent: 'Oriental', price: 35 },
            // HOMME
            { id: '038', type: 'Homme', name: 'Bleu de Chanel', scent: 'Boisé Aromatique', price: 35 },
            { id: '001', type: 'Homme', name: 'One Million', scent: 'Cuir Épicé', price: 35 },
            { id: '068', type: 'Homme', name: 'Aventus Creed', scent: 'Chypré', price: 57 },
            { id: '061', type: 'Homme', name: 'Sauvage Dior', scent: 'Fougère', price: 35 }
        ];

        let cart = [];

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            renderCatalog();
        }

        function toggleCurrency() {
            currentCurrency = (currentCurrency === 'EUR') ? 'DZD' : 'EUR';
            document.getElementById('currency-switch').classList.toggle('currency-dzd');
            document.getElementById('opt-eur').classList.toggle('active');
            document.getElementById('opt-dzd').classList.toggle('active');
            renderAll();
        }

        function renderCatalog() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            const rate = document.getElementById('rate').value;
            grid.innerHTML = '';

            const filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(search) || p.id.includes(search) || p.scent.toLowerCase().includes(search);
                const matchesCat = currentCategory === 'all' || p.type === currentCategory;
                return matchesSearch && matchesCat;
            });

            filtered.forEach(p => {
                const displayPrice = (currentCurrency === 'EUR') 
                    ? p.price.toFixed(2) + ' €' 
                    : Math.round(p.price * rate).toLocaleString() + ' DA';

                grid.innerHTML += `
                    <div class="product-card p-4 flex flex-col justify-between shadow-sm animate-fadeIn">
                        <div class="h-24 bg-white flex items-center justify-center mb-2">
                            <img src="https://www.chogangroup.com/img/products/${p.id}.jpg" 
                                 onerror="this.src='https://via.placeholder.com/80/ffffff/b8860b?text=${p.id}'"
                                 class="max-h-20 object-contain">
                        </div>
                        <p class
