<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIMITLESS - CHOGAN TEAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #f9e29c 50%, #b8860b 100%);
            --gold-text: #d4af37;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            color: white; 
            margin: 0;
            overflow-x: hidden;
        }
        .chogan-font { font-family: 'Cinzel', serif; }
        .gold-gradient { background: var(--gold); }
        .gold-border { border: 1px solid #d4af37; }
        .gold-text { color: #d4af37; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.2); }
        
        .btn-gold {
            background: var(--gold);
            color: black;
            font-weight: 900;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        .btn-gold:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
        
        <div id="login-screen" class="fixed inset-0 z-50 bg-black flex flex-col justify-center p-8 text-center">
            <div class="mb-12">
                <h1 class="chogan-font text-4xl tracking-[0.2em] gold-text mb-2">CHOGAN</h1>
                <div class="h-[1px] w-24 bg-gold-text mx-auto mb-4" style="background: var(--gold)"></div>
                <h2 class="text-6xl font-black italic tracking-tighter">LIMITLESS<span class="gold-text">.</span></h2>
                <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em] mt-4">Elite Team Marie Chogan</p>
            </div>
            
            <div class="space-y-5">
                <div class="relative">
                    <input id="user-name" type="text" placeholder="IDENTIFIANT" 
                        class="w-full p-5 rounded-none bg-transparent border-b border-white/20 outline-none focus:border-gold-text transition-all text-center tracking-widest text-sm">
                </div>
                <div class="relative">
                    <input id="user-pass" type="password" placeholder="MOT DE PASSE" 
                        class="w-full p-5 rounded-none bg-transparent border-b border-white/20 outline-none focus:border-gold-text transition-all text-center tracking-widest text-sm">
                </div>
                <button onclick="handleLogin()" class="btn-gold w-full p-5 mt-8 text-xs uppercase">Se Connecter</button>
            </div>
        </div>

        <header id="app-header" class="hidden p-6 sticky top-0 bg-black/90 backdrop-blur-xl z-40 border-b border-[#d4af37]/20 flex justify-between items-center">
            <div>
                <h1 class="chogan-font text-lg gold-text tracking-widest">CHOGAN</h1>
                <p id="user-badge" class="text-[9px] font-bold text-white uppercase tracking-tighter">Membre Privilège</p>
            </div>
            <div class="w-10 h-10 rounded-full gold-border flex items-center justify-center overflow-hidden bg-white/5">
                <span class="text-[10px] gold-text font-bold">MC</span>
            </div>
        </header>

        <main id="main-content" class="hidden p-6 space-y-6">
            <div class="glass p-8 rounded-tr-[3rem] rounded-bl-[3rem] relative overflow-hidden">
                <p class="text-[10px] font-bold gold-text mb-2 uppercase tracking-[0.2em]">Vision 2026</p>
                <h2 class="text-2xl font-light leading-tight">Portez l'excellence, visez le <span class="gold-text font-bold italic">Platinum</span>.</h2>
                <div class="mt-6 h-1 w-12 gold-gradient"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 text-center">
                    <p class="text-[9px] uppercase text-gray-500 mb-1">Objectif</p>
                    <p class="text-xl font-bold italic">85%</p>
                </div>
                <div class="glass p-5 text-center">
                    <p class="text-[9px] uppercase text-gray-500 mb-1">Rang</p>
                    <p class="text-xl font-bold italic gold-text">Top 10</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function handleLogin() {
            const name = document.getElementById('user-name').value;
            const pass = document.getElementById('user-pass').value;
            
            // On garde ton mot de passe par défaut
            if(name.length > 2 && pass === "MARIE2026") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-header').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else {
                alert("Accès refusé. Vérifiez vos identifiants.");
            }
        }
    </script>
</body>
</html>
