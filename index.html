<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHOGAN ELITE - MARIE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fff; color: #000; padding-bottom: 110px; }
        .gold-text { color: #C5A059; }
        .page { display: none; }
        .page.active { display: block; }
        .nav-bar { background: #fff; border-top: 1px solid #eee; height: 85px; position: fixed; bottom: 0; width: 100%; display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; color: #bbb; font-weight: bold; text-transform: uppercase; border: none; background: none; }
        .nav-item.active { color: #C5A059; }
        .card-perf { border: 1px solid #eee; border-radius: 20px; text-align: center; padding: 15px; position: relative; }
        .recap-box { border: 3px solid #000; border-radius: 20px; padding: 20px; box-shadow: 5px 5px 0px #000; }
        .btn-currency { border: 1px solid #eee; border-radius: 25px; padding: 8px 15px; font-weight: bold; font-size: 10px; }
        .btn-currency.active { background: #000; color: #fff; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center bg-white sticky top-0 z-50">
        <div>
            <h1 class="text-2xl font-black">CHOGAN</h1>
            <p class="text-[10px] gold-text font-bold uppercase tracking-widest">Elite Marie</p>
        </div>
        <div class="bg-black text-white p-2 rounded-xl text-center shadow-lg">
            <p class="text-[8px] uppercase font-bold text-zinc-400">Taux DA</p>
            <input type="number" id="taux-input" value="245" onchange="updateAll()" class="bg-transparent text-center text-lg font-black w-12 outline-none border-b border-zinc-700">
        </div>
    </header>

    <div id="p1" class="page active p-4">
        <div class="flex justify-center gap-2 mb-6">
            <button onclick="setCurrency('EUR')" id="btn-eur" class="btn-currency active">EUROS (€)</button>
            <button onclick="setCurrency('DA')" id="btn-da" class="btn-currency">DINARS (DA)</button>
        </div>
        <div class="grid grid-cols-2 gap-4" id="list-container">
            </div>
    </div>

    <div id="p2" class="page p-6">
        <h2 class="text-xl font-black uppercase mb-6 border-b-4 border-black pb-1 inline-block">Récapitulatif</h2>
        <div id="order-items" class="space-y-3 mb-6"></div>
        <div class="recap-box">
            <div class="flex justify-between items-center font-bold mb-2 uppercase text-xs">
                <span>Frais de port (<span class="cur-txt">€</span>)</span>
                <span class="bg-zinc-100 px-3 py-1 border border-black rounded-lg">2,5</span>
            </div>
            <div class="border-t border-zinc-200 my-4"></div>
            <div class="flex justify-between items-end">
                <span class="text-lg font-black">TOTAL :</span>
                <span class="text-2xl font-black" id="total-val">0.00 €</span>
            </div>
        </div>
        <button onclick="send()" class="w-full bg-black text-white py-5 rounded-2xl mt-8 font-black uppercase flex items-center justify-center gap-3 active:scale-95 transition-all">
            📤 Envoyer la commande
        </button>
    </div>

    <div id="p3" class="page p-6 text-center"><h2>Club Diamond</h2></div>
    <div id="p4" class="page p-6 text-center"><h2>Goal & Stats</h2></div>
    <div id="p5" class="page p-6 text-center"><h2>Admin Panel</h2></div>
    <div id="p6" class="page p-6 text-center"><h2>Learn Center</h2></div>
    <div id="p7" class="page p-6 text-center"><h2>Mon Profil</h2></div>

    <nav class="nav-bar">
        <button onclick="show(1)" class="nav-item active" id="n1">🛍️<br>Shop</button>
        <button onclick="show(2)" class="nav-item" id="n2">📜<br>Ordre</button>
        <button onclick="show(3)" class="nav-item" id="n3">💎<br>Club</button>
        <button onclick="show(4)" class="nav-item" id="n4">📈<br>Goal</button>
        <button onclick="show(5)" class="nav-item" id="n5">📢<br>Admin</button>
        <button onclick="show(6)" class="nav-item" id="n6">🎓<br>Learn</button>
        <button onclick="show(7)" class="nav-item" id="n7">👤<br>Moi</button>
    </nav>

    <script>
        let currency = 'EUR';
        let cart = [];
        
        const products = [
            { id: "007", n: "J'adore", b: "J", p: 18 },
            { id: "042", n: "La Vie Est Belle", b: "L", p: 18 },
            { id: "094", n: "Sauvage", b: "S", p: 18 },
            { id: "118", n: "Baccarat Rouge", b: "B", p: 18 },
            { id: "068", n: "Aventus", b: "A", p: 18 },
            { id: "105", n: "Oud Wood", b: "O", p: 52 }
        ];

        function setCurrency(c) {
            currency = c;
            document.getElementById('btn-eur').classList.toggle('active', c==='EUR');
            document.getElementById('btn-da').classList.toggle('active', c==='DA');
            updateAll();
        }

        function updateAll() {
            renderProducts();
            updateRecap();
        }

        function renderProducts() {
            const t = parseFloat(document.getElementById('taux-input').value) || 1;
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            products.forEach(p => {
                const finalPrice = currency === 'EUR' ? p.p : (p.p * t);
                container.innerHTML += `
                    <div class="card-perf shadow-sm">
                        <div class="w-14 h-14 bg-yellow-50 rounded-full flex items-center justify-center text-xl font-bold gold-text mx-auto mb-2">${p.b}</div>
                        <p class="gold-text text-[8px] font-bold">#${p.id}</p>
                        <h3 class="font-bold text-[10px] uppercase mb-2 truncate">${p.n}</h3>
                        <p class="font-black text-sm mb-3">${finalPrice.toLocaleString()} ${currency==='EUR'?'€':'DA'}</p>
                        <button onclick="add('${p.id}')" class="bg-black text-white w-full py-2 rounded-lg font-bold text-[9px] uppercase">Prendre</button>
                    </div>`;
            });
        }

        function add(id) {
            cart.push(products.find(x => x.id === id));
            updateRecap();
            // Petit retour visuel sur l'icône Ordre
            const ord = document.getElementById('n2');
            ord.style.transform = "scale(1.2)";
            setTimeout(() => ord.style.transform = "scale(1)", 200);
        }

        function updateRecap() {
            const t = parseFloat(document.getElementById('taux-input').value) || 1;
            const list = document.getElementById('order-items');
            list.innerHTML = '';
            let subtotal = 0;

            cart.forEach((item, i) => {
                const p = currency === 'EUR' ? item.p : (item.p * t);
                subtotal += p;
                list.innerHTML += `
                    <div class="border-2 border-black rounded-xl p-3 flex justify-between items-center font-bold text-[11px] uppercase">
                        <span>${item.n}</span>
                        <div class="flex items-center gap-3">
                            <span>${p.toLocaleString()} ${currency==='EUR'?'€':'DA'}</span>
                            <button onclick="cart.splice(${i},1);updateRecap()" class="text-red-500 text-lg">×</button>
                        </div>
                    </div>`;
            });

            const ship = 2.5;
            const total = subtotal + (currency === 'EUR' ? ship : ship * t);
            document.getElementById('total-val').innerText = total.toLocaleString() + (currency==='EUR'?' €':' DA');
        }

        function show(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('p'+n).classList.add('active');
            document.getElementById('n'+n).classList.add('active');
        }

        function send() {
            if(!cart.length) return alert("Panier vide !");
            let m = `*NOUVELLE COMMANDE CHOGAN*\n\n`;
            cart.forEach(i => m += `• ${i.n} (#${i.id})\n`);
            m += `\n*TOTAL : ${document.getElementById('total-val').innerText}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(m)}`);
        }

        renderProducts();
    </script>
</body>
</html>
