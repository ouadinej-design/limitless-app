<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGAN LUXE - MARIE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --soft-gray: #f9f9f9; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; margin: 0; }
        .chogan-font { font-family: 'Cinzel', serif; color: var(--gold); }
        
        /* Design purifié type Catalogue */
        .luxury-card { 
            background: #fff; 
            border: 1px solid #f0f0f0; 
            border-radius: 4px; 
            transition: all 0.3s ease;
        }
        .luxury-card:hover { border-color: var(--gold); }
        
        /* Boutons Catégories */
        .cat-btn { 
            font-size: 9px; 
            font-weight: 700; 
            letter-spacing: 1.5px;
            padding: 8px; 
            text-transform: uppercase;
            color: #ccc;
            border-bottom: 2px solid transparent;
        }
        .cat-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

        /* Actions principales */
        .btn-black {
            background: #000;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 15px;
            border-radius: 2px;
            width: 100%;
        }

        /* Navigation basse */
        .nav-btn { display: flex; flex-direction: column; align-items: center; opacity: 0.2; color: #000; transition: 0.3s; }
        .nav-btn.active { opacity: 1; color: var(--gold); }
        
        .tab-content { display: none; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto">

    <header class="p-8 text-center bg-white border-b border-gray-50">
        <h1 class="chogan-font text-3xl tracking-[8px] font-bold uppercase">CHOGAN</h1>
        <p class="text-[9px] tracking-[4px] text-gray-400 uppercase mt-2">Elite Management • Marie</p>
        
        <div class="mt-4 flex justify-center gap-4 text-[10px] font-bold border-t border-gray-100 pt-4">
            <div class="flex items-center gap-1">
                <span>TAUX:</span>
                <input type="number" id="rate" value="245" oninput="updateAll()" class="w-10 text-amber-700 outline-none">
            </div>
            <div class="h-4 w-[1px] bg-gray-200"></div>
            <div id="currency-toggle" class="cursor-pointer flex gap-3">
                <span onclick="setCurrency('EUR')" id="opt-eur" class="text-black">EUR</span>
                <span onclick="setCurrency('DZD')" id="opt-dzd" class="text-gray-300">DZD</span>
            </div>
        </div>
    </header>

    <div id="tab1" class="tab-content active p-4">
        <input type="text" id="search" onkeyup="renderCatalog()" placeholder="RECHERCHER DANS LE CATALOGUE..." 
               class="w-full p-3 border-b border-gray-100 mb-6 outline-none text-[10px] tracking-widest text-center">

        <div class="flex justify-around mb-8 border-b border-gray-50 pb-2">
            <button onclick="setFilter('ALL')" id="filter-ALL" class="cat-btn active">Tous</button>
            <button onclick="setFilter('W')" id="filter-W" class="cat-btn">Femmes</button>
            <button onclick="setFilter('M')" id="filter-M" class="cat-btn">Hommes</button>
            <button onclick="setFilter('L')" id="filter-L" class="cat-btn">Luxury</button>
        </div>

        <div id="grid" class="grid grid-cols-2 gap-x-4 gap-y-8"></div>
    </div>

    <div id="tab2" class="tab-content p-6">
        <h2 class="chogan-font text-lg text-center tracking-[4px] mb-10 uppercase">Votre Panier</h2>
        
        <div id="cart-list" class="space-y-6 mb-10"></div>
        
        <div class="border-t border-b border-gray-100 py-6 mb-8">
            <div class="flex justify-between text-[10px] tracking-widest text-gray-400 mb-4 uppercase">
                <span>Livraison</span>
                <div class="flex items-center">
                    <input type="number" id="ship" value="2.5" oninput="updateAll()" class="w-12 text-right outline-none bg-transparent text-black font-bold">
                    <span class="cur-sym ml-1">€</span>
                </div>
            </div>
            <div class="flex justify-between items-center uppercase tracking-[2px]">
                <span class="text-xs font-bold">Total</span>
                <span id="final-total" class="text-xl font-bold text-amber-700">0 €</span>
            </div>
        </div>

        <button onclick="generateOrder()" class="btn-black mb-4">Commander via WhatsApp</button>
        <button onclick="resetCart()" class="w-full text-[8px] tracking-[2px] text-gray-300 uppercase font-bold">Vider la sélection</button>
    </div>

    <div id="tab5" class="tab-content p-8 text-center">
        <h2 class="chogan-font text-lg tracking-[4px] mb-12 uppercase">Configuration</h2>
        <div class="py-10 border border-dashed border-gray-200 rounded mb-6">
            <p class="text-[9px] tracking-widest text-gray-400 mb-6 uppercase">Importer la liste des produits (PDF)</p>
            <input type="file" id="pdfInput" accept="application/pdf" class="hidden" onchange="handlePDF(event)">
            <button onclick="document.getElementById('pdfInput').click()" class="border border-black px-6 py-2 text-[10px] uppercase tracking-widest font-bold">Choisir Fichier</button>
        </div>
        <button onclick="clearCatalog()" class="text-red-200 text-[8px] uppercase tracking-widest">Effacer toute la base</button>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 grid grid-cols-7 p-4 z-50 bg-white/95 border-t border-gray-50">
        <button onclick="showTab(1)" id="nav1" class="nav-btn active"><span class="text-lg">🛍️</span><span class="text-[6px] font-black uppercase mt-1">Shop</span></button>
        <button onclick="showTab(2)" id="nav2" class="nav-btn"><span class="text-lg">📜</span><span class="text-[6px] font-black uppercase mt-1">Ordre</span></button>
        <button class="nav-btn"><span class="text-lg opacity-10">💎</span></button>
        <button class="nav-btn"><span class="text-lg opacity-10">📈</span></button>
        <button onclick="showTab(5)" id="nav5" class="nav-btn"><span class="text-lg">⚙️</span><span class="text-[6px] font-black uppercase mt-1">Admin</span></button>
        <button class="nav-btn"><span class="text-lg opacity-10">🎓</span></button>
        <button class="nav-btn"><span class="text-lg opacity-10">👤</span></button>
    </nav>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let currentCurrency = 'EUR';
        let currentFilter = 'ALL';
        let cart = [];
        let products = JSON.parse(localStorage.getItem('chogan_marie_db')) || [];

        const imgMap = { 'W': '14856.jpg', 'M': '14859.jpg', 'L': '14833.jpg', 'DEFAULT': '14857.jpg' };

        function setFilter(cat) {
            currentFilter = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('filter-' + cat).classList.add('active');
            renderCatalog();
        }

        function setCurrency(cur) {
            currentCurrency = cur;
            document.getElementById('opt-eur').style.color = (cur === 'EUR' ? '#000' : '#ccc');
            document.getElementById('opt-dzd').style.color = (cur === 'DZD' ? '#000' : '#ccc');
            const rate = document.getElementById('rate').value;
            const ship = document.getElementById('ship');
            ship.value = (cur === 'EUR') ? 2.5 : Math.round(2.5 * rate);
            updateAll();
        }

        function renderCatalog() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            const rate = document.getElementById('rate').value;
            grid.innerHTML = products.length === 0 ? '<div class="col-span-2 text-center py-20 text-gray-200 text-[9px] uppercase tracking-widest">Prêt pour l\'import PDF</div>' : '';
            
            const filtered = products.filter(p => {
                const mSearch = p.brand.toLowerCase().includes(search) || p.id.toLowerCase().includes(search);
                const mCat = (currentFilter === 'ALL') || (p.cat === currentFilter);
                return mSearch && mCat;
            });

            filtered.forEach(p => {
                const priceText = (currentCurrency === 'EUR') ? p.price.toFixed(2) + ' €' : Math.round(p.price * rate).toLocaleString() + ' DA';
                const imgSrc = imgMap[p.cat] || imgMap['DEFAULT'];
                
                grid.innerHTML += `
                    <div class="luxury-card pb-4">
                        <img src="${imgSrc}" class="h-44 w-full object-cover rounded-t">
                        <div class="px-2 pt-4 text-center">
                            <h3 class="text-[10px] font-bold uppercase truncate tracking-tight text-gray-900">${p.brand}</h3>
                            <p class="text-[11px] font-medium text-amber-700 mt-1">${priceText}</p>
                            <button onclick="addToCart('${p.brand}', ${p.price})" class="mt-3 text-[8px] font-bold uppercase tracking-[2px] border-b border-black pb-1 hover:text-amber-600 hover:border-amber-600 transition">Ajouter</button>
                        </div>
                    </div>`;
            });
        }

        function generateOrder() {
            if(cart.length === 0) return;
            const rate = document.getElementById('rate').value;
            const shipVal = parseFloat(document.getElementById('ship').value) || 0;
            const cur = currentCurrency === 'EUR' ? '€' : 'DA';
            let text = `📦 *CHOGAN LUXE - MARIE*\n---\n`;
            cart.forEach(i => {
                const p = (currentCurrency === 'EUR') ? i.price.toFixed(2) + ' €' : Math.round(i.price * rate) + ' DA';
                text += `• ${i.brand} : ${p}\n`;
            });
            text += `• Livraison : ${shipVal.toLocaleString()} ${cur}\n`;
            text += `---\n*TOTAL : ${document.getElementById('final-total').innerText}*`;
            navigator.clipboard.writeText(text);
            alert("Sélection copiée !");
        }

        // Fonctions techniques inchangées pour garder la stabilité
        async function handlePDF(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(item => item.str).join(" ") + "\n";
                }
                extractData(fullText);
            };
            reader.readAsArrayBuffer(file);
        }

        function extractData(text) {
            const regex = /(\d+[A-Z]*)\.\s+([A-Za-z\s']+)\s+.*?\s+(\d+[A-Z]*[-]*70ml|70ml|50ml)\s*[-]*\s*(\d+,\d+)\s*€/gi;
            let match; const newProducts = [];
            while ((match = regex.exec(text)) !== null) {
                const id = match[1]; const price = parseFloat(match[4].replace(',', '.'));
                let cat = id.includes('M') ? 'M' : (price > 40 ? 'L' : 'W');
                newProducts.push({ id, brand: match[2].trim(), price, cat });
            }
            if (newProducts.length > 0) {
                products = newProducts; localStorage.setItem('chogan_marie_db', JSON.stringify(products));
                updateAll(); showTab(1);
            }
        }

        function addToCart(brand, price) { cart.push({brand, price}); updateAll(); showTab(2); }
        function remove(i) { cart.splice(i, 1); updateAll(); }
        function resetCart() { cart = []; updateAll(); }
        function clearCatalog() { products = []; localStorage.removeItem('chogan_marie_db'); updateAll(); }

        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav' + n).classList.add('active');
        }

        function updateAll() {
            renderCatalog();
            const list = document.getElementById('cart-list');
            const rate = document.getElementById('rate').value;
            list.innerHTML = cart.length ? '' : '<div class="text-center py-10 font-medium text-gray-200 text-[10px] uppercase tracking-widest">Panier Vide</div>';
            cart.forEach((item, i) => {
                const p = (currentCurrency === 'EUR') ? item.price.toFixed(2) + ' €' : Math.round(item.price * rate).toLocaleString() + ' DA';
                list.innerHTML += `<div class="flex justify-between items-center py-4 border-b border-gray-50">
                    <div class="text-[10px] font-bold uppercase tracking-tight">${item.brand}</div>
                    <div class="text-[10px] font-bold text-amber-700">${p} <button onclick="remove(${i})" class="ml-4 text-gray-300">×</button></div>
                </div>`;
            });
            const ship = parseFloat(document.getElementById('ship').value) || 0;
            const sub = cart.reduce((s, i) => s + i.price, 0);
            document.querySelectorAll('.cur-sym').forEach(el => el.innerText = (currentCurrency === 'EUR' ? '€' : 'DA'));
            if (currentCurrency === 'EUR') { document.getElementById('final-total').innerText = (sub + ship).toFixed(2) + " €"; }
            else { document.getElementById('final-total').innerText = Math.round((sub * rate) + ship).toLocaleString() + " DA"; }
        }
        updateAll();
    </script>
</body>
</html>
