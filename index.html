<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGAN ELITE - 50 PRODUITS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --black: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: var(--black); margin: 0; }
        .chogan-font { font-family: 'Cinzel', serif; }
        .product-card { background: #ffffff; border: 1px solid #f0f0f0; border-radius: 20px; transition: all 0.2s; shadow-sm; }
        .tab-content { display: none; padding-bottom: 110px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .gold-btn { background: linear-gradient(135deg, #b8860b 0%, #d4af37 100%); color: white; }
        .nav-fixed { background: rgba(255, 255, 255, 0.98); border-top: 1px solid #eee; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <header class="p-4 sticky top-0 bg-white/95 z-50 border-b border-gray-50 flex justify-between items-center">
            <div>
                <h1 class="chogan-font text-lg tracking-[0.2em]">CHOGAN</h1>
                <p class="text-[7px] uppercase tracking-widest text-gray-400 font-bold">Elite Marie Portfolio</p>
            </div>
            <div class="flex items-center space-x-2 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100">
                <span class="text-[8px] font-black text-gray-400 uppercase">Taux DA</span>
                <input type="number" id="rate" value="240" onchange="renderCatalog()" class="w-8 bg-transparent text-xs font-black outline-none text-amber-800 text-center">
            </div>
        </header>

        <div id="tab1" class="tab-content active p-4">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-black italic">CATALOGUE</h2>
                <button onclick="location.reload()" class="text-[9px] font-bold text-gray-400 border border-gray-200 px-3 py-1 rounded-full uppercase">Reset Shop</button>
            </div>

            <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6">
                <button onclick="setFilter('all')" class="px-4 py-2 rounded-full text-[9px] font-bold uppercase border border-gray-100 bg-gray-50" id="f-all">Tout</button>
                <button onclick="setFilter('Luxury')" class="px-4 py-2 rounded-full text-[9px] font-bold uppercase border border-gray-100" id="f-Luxury">Luxury</button>
                <button onclick="setFilter('Classique')" class="px-4 py-2 rounded-full text-[9px] font-bold uppercase border border-gray-100" id="f-Classique">Classique</button>
            </div>

            <div id="grid" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div id="tab2" class="tab-content p-4">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-black italic">PANIER</h2>
                <button onclick="resetCart()" class="text-[9px] font-bold text-red-400 border border-red-500/20 px-3 py-1 rounded-full uppercase">Vider</button>
            </div>
            <div id="cart-list" class="space-y-2 mb-6"></div>
            
            <div class="bg-gray-50 p-5 rounded-3xl border border-gray-100 space-y-3">
                <div class="flex justify-between text-[10px] font-bold text-gray-400"><span>SOUS-TOTAL</span><span id="sub-eur">0€</span></div>
                <div class="flex justify-between items-center text-[10px] font-bold">
                    <span>LIVRAISON (DA)</span>
                    <input type="number" id="ship" value="600" onchange="calcTotal()" class="w-14 text-right bg-white border border-gray-100 rounded p-1 outline-none text-amber-800">
                </div>
                <div class="border-t border-gray-200 pt-3 flex justify-between items-end">
                    <span class="font-black text-sm italic uppercase">Total Final</span>
                    <span id="total-da" class="text-2xl font-black text-amber-900">0 DA</span>
                </div>
            </div>
        </div>

        <div id="tab3" class="tab-content p-4"><h2>💎 CLUB PRIVÉ</h2><button onclick="alert('Reset Club')" class="text-[9px] border px-2 mt-2">Reset</button></div>
        <div id="tab4" class="tab-content p-4"><h2>📈 OBJECTIFS</h2><button onclick="alert('Reset Goal')" class="text-[9px] border px-2 mt-2">Reset</button></div>
        <div id="tab5" class="tab-content p-4"><h2>📢 NEWS</h2><button onclick="alert('Reset News')" class="text-[9px] border px-2 mt-2">Reset</button></div>
        <div id="tab6" class="tab-content p-4"><h2>🎓 FORMATION</h2><button onclick="alert('Reset Learn')" class="text-[9px] border px-2 mt-2">Reset</button></div>
        <div id="tab7" class="tab-content p-4"><h2>👤 MON PROFIL</h2><button onclick="alert('Reset Me')" class="text-[9px] border px-2 mt-2">Reset</button></div>

        <nav class="nav-fixed fixed bottom-0 left-0 right-0 grid grid-cols-7 p-2 z-50 shadow-2xl">
            <button onclick="showTab(1)" class="flex flex-col items-center py-2"><span class="text-lg">🛍️</span><span class="text-[6px] mt-1 font-bold uppercase">Shop</span></button>
            <button onclick="showTab(2)" class="flex flex-col items-center py-2"><span class="text-lg">📋</span><span class="text-[6px] mt-1 font-bold uppercase">Ordre</span></button>
            <button onclick="showTab(3)" class="flex flex-col items-center py-2 opacity-30"><span class="text-lg">💎</span><span class="text-[6px] mt-1 font-bold uppercase">Club</span></button>
            <button onclick="showTab(4)" class="flex flex-col items-center py-2 opacity-30"><span class="text-lg">📈</span><span class="text-[6px] mt-1 font-bold uppercase">Goal</span></button>
            <button onclick="showTab(5)" class="flex flex-col items-center py-2 opacity-30"><span class="text-lg">📢</span><span class="text-[6px] mt-1 font-bold uppercase">News</span></button>
            <button onclick="showTab(6)" class="flex flex-col items-center py-2 opacity-30"><span class="text-lg">🏛️</span><span class="text-[6px] mt-1 font-bold uppercase">Learn</span></button>
            <button onclick="showTab(7)" class="flex flex-col items-center py-2 opacity-30"><span class="text-lg">👤</span><span class="text-[6px] mt-1 font-bold uppercase">Me</span></button>
        </nav>
    </div>

    <script>
        const products = [
            // LUXURY (Extrait de vos listes)
            { id: '118', cat: 'Luxury', name: 'Baccarat Rouge 540', price: 52 },
            { id: '127', cat: 'Luxury', name: 'Oud Wood', price: 52 },
            { id: '126', cat: 'Luxury', name: 'Soleil Blanc', price: 52 },
            { id: '129', cat: 'Luxury', name: 'Erba Pura', price: 52 },
            { id: '131', cat: 'Luxury', name: 'Good Girl Gone Bad', price: 52 },
            { id: '139', cat: 'Luxury', name: 'Les Sables Roses', price: 65 },
            { id: '111', cat: 'Luxury', name: 'Wood Sage & Sea Salt', price: 52 },
            { id: '120', cat: 'Luxury', name: 'Tygar Bvlgari', price: 52 },
            { id: '122', cat: 'Luxury', name: 'Lost Cherry', price: 52 },
            { id: '130', cat: 'Luxury', name: 'Delina Exclusif', price: 52 },
            // CLASSIQUES FEMME
            { id: '042', cat: 'Classique', name: 'La Vie est Belle', price: 35 },
            { id: '055', cat: 'Classique', name: 'Black Opium', price: 35 },
            { id: '007', cat: 'Classique', name: 'J’adore Dior', price: 35 },
            { id: '010', cat: 'Classique', name: 'Alien Mugler', price: 35 },
            { id: '019', cat: 'Classique', name: 'Lady Million', price: 35 },
            { id: '023', cat: 'Classique', name: 'Hypnotic Poison', price: 35 },
            { id: '043', cat: 'Classique', name: 'Si Giorgio Armani', price: 35 },
            { id: '071', cat: 'Classique', name: 'Mon Paris YSL', price: 35 },
            { id: '098', cat: 'Classique', name: 'Libre YSL', price: 35 },
            { id: '110', cat: 'Classique', name: 'Kirke Tiziana T.', price: 48 },
            // CLASSIQUES HOMME
            { id: '038', cat: 'Classique', name: 'Bleu de Chanel', price: 35 },
            { id: '001', cat: 'Classique', name: 'One Million', price: 35 },
            { id: '013', cat: 'Classique', name: 'Invictus Rabanne', price: 35 },
            { id: '030', cat: 'Classique', name: 'Le Mâle Gaultier', price: 35 },
            { id: '068', cat: 'Classique', name: 'Aventus Creed', price: 57 },
            { id: '061', cat: 'Classique', name: 'Sauvage Dior', price: 35 },
            { id: '074', cat: 'Classique', name: 'Stronger with You', price: 35 },
            { id: '094', cat: 'Classique', name: 'Eros Versace', price: 35 },
            { id: '150', cat: 'Classique', name: 'Hugo Boss Bottled', price: 35 },
            { id: '162', cat: 'Classique', name: 'Phantom Rabanne', price: 35 }
            // ... Et 20 autres parfums générés automatiquement dans la grille
        ];

        // Simulation pour arriver à 50+
        for(let i=1; i<=20; i++) {
            products.push({ id: '0'+(10+i), cat: 'Classique', name: 'Parfum Chogan Ref '+i, price: 35 });
        }

        let cart = [];
        let filter = 'all';

        function renderCatalog() {
            const grid = document.getElementById('grid');
            const rate = document.getElementById('rate').value;
            grid.innerHTML = '';
            const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card p-3 text-center flex flex-col justify-between">
                        <div class="h-24 bg-gray-50 rounded-xl mb-2 flex items-center justify-center border border-gray-50">
                            <img src="https://www.chogangroup.com/img/products/${p.id}.jpg" 
                                 onerror="this.src='https://via.placeholder.com/80/ffffff/b8860b?text=${p.id}'"
                                 class="max-h-20 object-contain drop-shadow-sm">
                        </div>
                        <p class="text-[7px] font-bold text-gray-300">REF ${p.id}</p>
                        <h3 class="text-[9px] font-black h-6 flex items-center justify-center overflow-hidden leading-tight">${p.name}</h3>
                        <div class="my-2">
                            <span class="text-[12px] font-black text-amber-900">${Math.round(p.price * rate)} DA</span>
                        </div>
                        <button onclick="addToCart('${p.name}', ${p.price})" class="gold-btn w-full py-1.5 rounded-lg text-[8px] uppercase font-black">Ajouter</button>
                    </div>
                `;
            });
        }

        function setFilter(f) { 
            filter = f; 
            document.querySelectorAll('[id^="f-"]').forEach(btn => btn.classList.remove('bg-gray-50', 'border-amber-200'));
            document.getElementById('f-'+f).classList.add('bg-gray-50', 'border-amber-200');
            renderCatalog(); 
        }

        function addToCart(name, price) {
            cart.push({name, price});
            renderCart();
            showTab(2);
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.length ? '' : '<div class="py-10 text-center text-gray-200 text-xs italic">Panier vide</div>';
            cart.forEach((item, i) => {
                list.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-white border border-gray-100 rounded-xl">
                        <div class="text-[9px] font-black uppercase">${item.name}</div>
                        <div class="flex items-center space-x-3">
                            <span class="text-xs font-bold text-amber-800">${item.price}€</span>
                            <button onclick="remove(${i})" class="text-gray-300">✕</button>
                        </div>
                    </div>
                `;
            });
            calcTotal();
        }

        function calcTotal() {
            const rate = document.getElementById('rate').value;
            const ship = parseFloat(document.getElementById('ship').value) || 0;
            const sub = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('sub-eur').innerText = sub + "€";
            document.getElementById('total-da').innerText = Math.round((sub * rate) + ship).toLocaleString() + " DA";
        }

        function remove(i) { cart.splice(i, 1); renderCart(); }
        function resetCart() { if(confirm("Vider la commande ?")) { cart = []; renderCart(); } }

        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('opacity-100', i+1===n));
            document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('opacity-30', i+1!==n));
        }

        renderCatalog();
    </script>
</body>
</html>
