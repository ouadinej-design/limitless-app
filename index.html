<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGAN ELITE - MODE DEVISES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; margin: 0; }
        .chogan-font { font-family: 'Cinzel', serif; }
        .product-card { background: #ffffff; border: 1px solid #f3f3f3; border-radius: 20px; }
        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .gold-gradient { background: linear-gradient(135deg, #b8860b 0%, #d4af37 100%); }
        
        /* Style du bouton Switch */
        .switch-container { background: #f0f0f0; border-radius: 50px; position: relative; display: flex; cursor: pointer; border: 2px solid #f0f0f0; }
        .switch-option { flex: 1; text-align: center; padding: 8px 0; font-size: 10px; font-weight: 900; z-index: 2; transition: color 0.3s; color: #999; }
        .switch-option.active { color: white; }
        .switch-slider { position: absolute; width: 50%; height: 100%; background: #1a1a1a; border-radius: 50px; transition: transform 0.3s ease; z-index: 1; }
        .currency-dzd .switch-slider { transform: translateX(100%); background: var(--gold); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <header class="p-4 sticky top-0 bg-white/95 z-50 border-b border-gray-50 flex justify-between items-center">
            <div>
                <h1 class="chogan-font text-lg tracking-[0.2em]">CHOGAN</h1>
                <p class="text-[7px] uppercase tracking-widest text-gray-400 font-bold">Elite Marie Portfolio</p>
            </div>
            <div class="flex flex-col items-end">
                <div class="flex items-center space-x-1 bg-gray-50 px-2 py-1 rounded-lg border border-gray-100">
                    <span class="text-[7px] font-bold text-gray-400">TAUX :</span>
                    <input type="number" id="rate" value="240" onchange="renderAll()" class="w-7 bg-transparent text-[10px] font-black outline-none text-amber-800 text-center">
                </div>
            </div>
        </header>

        <div id="tab1" class="tab-content active p-4">
            <input type="text" id="search" onkeyup="renderCatalog()" placeholder="Code, Nom, Senteur..." 
                   class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm outline-none mb-4">

            <div class="mb-6 px-10">
                <div id="currency-switch" class="switch-container" onclick="toggleCurrency()">
                    <div class="switch-slider" id="slider"></div>
                    <div class="switch-option active" id="opt-eur">EUROS (€)</div>
                    <div class="switch-option" id="opt-dzd">DINARS (DA)</div>
                </div>
            </div>

            <div id="grid" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div id="tab2" class="tab-content p-4">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-black italic">MA COMMANDE</h2>
                <button onclick="resetCart()" class="text-[9px] font-bold text-red-400 border border-red-100 px-3 py-1 rounded-full uppercase">Vider</button>
            </div>
            
            <div id="cart-list" class="space-y-2 mb-6"></div>
            
            <div class="bg-gray-50 p-6 rounded-[2.5rem] border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-gray-400 uppercase">Total à régler</span>
                    <span id="final-total" class="text-3xl font-black text-gray-900">0.00 €</span>
                </div>
                <div id="shipping-box" class="flex justify-between items-center text-[10px] font-bold pt-4 border-t border-gray-200">
                    <span>FRAIS DE LIVRAISON (DA)</span>
                    <input type="number" id="ship" value="600" onchange="calcTotal()" class="w-16 text-right bg-white border border-gray-100 rounded p-1 outline-none text-amber-800">
                </div>
            </div>
            <button class="gold-gradient w-full p-5 rounded-2xl mt-6 text-xs font-black uppercase tracking-widest text-white">Confirmer la vente</button>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 grid grid-cols-7 p-2 z-50 bg-white border-t border-gray-100">
            <button onclick="showTab(1)" class="flex flex-col items-center py-2"><span class="text-xl">🛍️</span><span class="text-[6px] mt-1 font-bold">SHOP</span></button>
            <button onclick="showTab(2)" class="flex flex-col items-center py-2"><span class="text-xl">📜</span><span class="text-[6px] mt-1 font-bold">ORDRE</span></button>
            <button onclick="showTab(3)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">💎</span><span class="text-[6px] mt-1 font-bold">CLUB</span></button>
            <button onclick="showTab(4)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">📈</span><span class="text-[6px] mt-1 font-bold">GOAL</span></button>
            <button onclick="showTab(5)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">📢</span><span class="text-[6px] mt-1 font-bold">NEWS</span></button>
            <button onclick="showTab(6)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">🏛️</span><span class="text-[6px] mt-1 font-bold">LEARN</span></button>
            <button onclick="showTab(7)" class="flex flex-col items-center py-2 opacity-30"><span class="text-xl">👤</span><span class="text-[6px] mt-1 font-bold">ME</span></button>
        </nav>
    </div>

    <script>
        let currentCurrency = 'EUR'; // 'EUR' ou 'DZD'
        const products = [
            { id: '118', name: 'Baccarat Rouge 540', scent: 'Floral Ambré', price: 52 },
            { id: '127', name: 'Oud Wood', scent: 'Boisé Oriental', price: 52 },
            { id: '038', name: 'Bleu', scent: 'Boisé Aromatique', price: 35 },
            { id: '055', name: 'Black Opium', scent: 'Oriental Vanillé', price: 35 },
            { id: '042', name: 'La Vie est Belle', scent: 'Floral Fruité', price: 35 },
            { id: '068', name: 'Aventus', scent: 'Chypré Fruité', price: 57 },
            { id: '110', name: 'Kirke', scent: 'Chypré Fruité', price: 48 },
            { id: '139', name: 'Les Sables Roses', scent: 'Oriental Floral', price: 65 }
        ];

        let cart = [];

        function toggleCurrency() {
            currentCurrency = (currentCurrency === 'EUR') ? 'DZD' : 'EUR';
            document.getElementById('currency-switch').classList.toggle('currency-dzd');
            document.getElementById('opt-eur').classList.toggle('active');
            document.getElementById('opt-dzd').classList.toggle('active');
            renderCatalog();
            calcTotal();
        }

        function renderCatalog() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            const rate = document.getElementById('rate').value;
            grid.innerHTML = '';

            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(search) || 
                p.id.includes(search) || 
                p.scent.toLowerCase().includes(search)
            );

            filtered.forEach(p => {
                const displayPrice = (currentCurrency === 'EUR') 
                    ? p.price.toFixed(2) + ' €' 
                    : Math.round(p.price * rate).toLocaleString() + ' DA';

                grid.innerHTML += `
                    <div class="product-card p-4 flex flex-col justify-between shadow-sm animate-fadeIn">
                        <div class="h-24 bg-white flex items-center justify-center mb-2">
                            <img src="https://www.chogangroup.com/img/products/${p.id}.jpg" 
                                 onerror="this.src='https://via.placeholder.com/80/ffffff/b8860b?text=${p.id}'"
                                 class="max-h-20 object-contain">
                        </div>
                        <p class="text-[7px] font-black text-gray-300 uppercase">REF ${p.id}</p>
                        <h3 class="text-[9px] font-black leading-tight h-6 overflow-hidden uppercase">${p.name}</h3>
                        <p class="text-[12px] font-black mt-2 ${currentCurrency === 'DZD' ? 'text-amber-800' : 'text-gray-900'}">${displayPrice}</p>
                        <button onclick="addToCart('${p.name}', ${p.price})" class="gold-gradient w-full py-2 rounded-xl text-[8px] font-black uppercase text-white mt-3">Ajouter</button>
                    </div>
                `;
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            renderCart();
            showTab(2);
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const rate = document.getElementById('rate').value;
            list.innerHTML = cart.length ? '' : '<div class="py-12 text-center text-gray-200 text-xs italic">Aucun article</div>';
            
            cart.forEach((item, i) => {
                const pDisplay = (currentCurrency === 'EUR') 
                    ? item.price.toFixed(2) + ' €' 
                    : Math.round(item.price * rate).toLocaleString() + ' DA';

                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <div class="text-[9px] font-black uppercase">${item.name}</div>
                        <div class="flex items-center space-x-4">
                            <span class="text-xs font-bold">${pDisplay}</span>
                            <button onclick="remove(${i})" class="text-gray-300">✕</button>
                        </div>
                    </div>
                `;
            });
            calcTotal();
        }

        function calcTotal() {
            const rate = document.getElementById('rate').value;
            const ship = (currentCurrency === 'DZD') ? parseFloat(document.getElementById('ship').value) || 0 : 0;
            const subEur = cart.reduce((s, i) => s + i.price, 0);
            
            // Masquer la livraison si on est en Euros (car livraison souvent locale en DA)
            document.getElementById('shipping-box').style.display = (currentCurrency === 'DZD') ? 'flex' : 'none';

            if(currentCurrency === 'EUR') {
                document.getElementById('final-total').innerText = subEur.toFixed(2) + " €";
            } else {
                const totalDzd = (subEur * rate) + ship;
                document.getElementById('final-total').innerText = Math.round(totalDzd).toLocaleString() + " DA";
            }
        }

        function remove(i) { cart.splice(i, 1); renderCart(); }
        function resetCart() { if(confirm("Vider ?")) { cart = []; renderCart(); } }
        function renderAll() { renderCatalog(); calcTotal(); }
        
        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('opacity-100', i+1===n));
            document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('opacity-30', i+1!==n));
        }

        renderCatalog();
    </script>
</body>
</html>
