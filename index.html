<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGAN ELITE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #000; margin: 0; }
        .chogan-font { font-family: 'Cinzel', serif; }
        .product-card { border: 2px solid #000; border-radius: 12px; overflow: hidden; background: #fff; box-shadow: 4px 4px 0px #000; }
        .product-img { height: 120px; width: 100%; object-fit: cover; border-bottom: 2px solid #000; }
        .tab-content { display: none; padding-bottom: 140px; }
        .tab-content.active { display: block; }
        .sw-opt { flex: 1; text-align: center; padding: 10px; font-size: 10px; font-weight: 900; border-radius: 8px; color: #fff; cursor: pointer; }
        .sw-opt.active { background: var(--gold); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.3; }
        .nav-btn.active { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen">
        
        <header class="p-4 sticky top-0 bg-white z-50 border-b-4 border-black flex justify-between items-center">
            <div>
                <h1 class="chogan-font text-xl font-bold tracking-widest">CHOGAN</h1>
                <p class="text-[8px] font-black text-amber-700 uppercase italic">Elite Marie - Officiel</p>
            </div>
            <div class="bg-black text-white p-2 rounded-xl border-2 border-amber-600">
                <span class="text-[7px] font-bold block uppercase text-amber-500 text-center">Taux</span>
                <input type="number" id="rate" value="245" oninput="updateAll()" class="w-10 bg-transparent text-white font-black text-center outline-none text-sm">
            </div>
        </header>

        <div id="tab1" class="tab-content active p-4">
            <input type="text" id="search" onkeyup="renderCatalog()" placeholder="Rechercher Ref ou Nom..." 
                   class="w-full p-4 border-4 border-black rounded-2xl font-bold mb-6 outline-none shadow-[4px_4px_0px_#000]">
            
            <div class="flex bg-black rounded-xl p-1 mb-6 border-2 border-black">
                <div id="opt-eur" onclick="setCurrency('EUR')" class="sw-opt active">EUROS (€)</div>
                <div id="opt-dzd" onclick="setCurrency('DZD')" class="sw-opt">DINARS (DA)</div>
            </div>

            <div id="grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="tab2" class="tab-content p-4">
            <h2 class="chogan-font text-xl mb-4 border-b-4 border-black pb-2 uppercase italic">Mon Panier</h2>
            <div id="cart-list" class="space-y-3 mb-6"></div>
            
            <div class="bg-white p-5 border-4 border-black rounded-2xl mb-6 shadow-[6px_6px_0px_#000]">
                <div class="flex justify-between items-center mb-4 text-xs font-black uppercase">
                    <span>Frais de port (<span class="currency-label">€</span>)</span>
                    <input type="number" id="ship" value="2.5" oninput="updateAll()" class="w-24 p-2 border-2 border-black rounded text-center bg-amber-50 font-bold">
                </div>
                <div class="flex justify-between items-center pt-4 border-t-2 border-dashed border-black">
                    <span class="font-black">TOTAL À PAYER :</span>
                    <span id="final-total" class="text-2xl font-black">0 €</span>
                </div>
            </div>

            <button onclick="generateOrder()" class="w-full bg-black text-white font-black py-5 rounded-2xl border-2 border-amber-600 uppercase text-xs mb-4">
                📤 Copier pour WhatsApp
            </button>
            <button onclick="resetCart()" class="w-full text-red-600 font-black uppercase text-[10px] underline">Effacer le panier</button>
        </div>

        <div id="tab5" class="tab-content p-4">
            <h2 class="chogan-font text-xl mb-6 border-b-4 border-black uppercase italic">Mise à jour Hebdo</h2>
            <div class="bg-white border-4 border-black rounded-2xl p-5 mb-6">
                <h3 class="text-[11px] font-black uppercase mb-4 italic text-amber-700">Importer nouveau PDF</h3>
                <input type="file" id="pdfInput" accept="application/pdf" class="hidden" onchange="handlePDF(event)">
                <button onclick="document.getElementById('pdfInput').click()" class="w-full bg-amber-600 text-white font-black py-4 rounded-xl border-2 border-black uppercase text-[10px] shadow-lg">Choisir le fichier PDF</button>
            </div>
            <button onclick="clearCatalog()" class="w-full bg-red-100 text-red-600 font-black py-3 rounded-xl border-2 border-red-600 uppercase text-[10px]">Vider tout le catalogue actuel</button>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 grid grid-cols-7 p-2 z-50 bg-white border-t-4 border-black">
            <button onclick="showTab(1)" id="nav1" class="nav-btn active"><span class="text-2xl">🛍️</span><span class="text-[7px] font-black uppercase mt-1">Shop</span></button>
            <button onclick="showTab(2)" id="nav2" class="nav-btn"><span class="text-2xl">📜</span><span class="text-[7px] font-black uppercase mt-1">Ordre</span></button>
            <button class="nav-btn opacity-10"><span class="text-2xl">💎</span><span class="text-[7px] font-black uppercase mt-1">Club</span></button>
            <button class="nav-btn opacity-10"><span class="text-2xl">📈</span><span class="text-[7px] font-black uppercase mt-1">Goal</span></button>
            <button onclick="showTab(5)" id="nav5" class="nav-btn"><span class="text-2xl">📢</span><span class="text-[7px] font-black uppercase mt-1">Admin</span></button>
            <button class="nav-btn opacity-10"><span class="text-2xl">🎓</span><span class="text-[7px] font-black uppercase mt-1">Learn</span></button>
            <button class="nav-btn opacity-10"><span class="text-2xl">👤</span><span class="text-[7px] font-black uppercase mt-1">Moi</span></button>
        </nav>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let currentCurrency = 'EUR';
        let cart = [];
        
        // Utilisation des photos envoyées
        const images = ["14859.jpg", "14857.jpg", "14856.jpg", "14858.jpg"];

        let products = JSON.parse(localStorage.getItem('chogan_db')) || [
            { id: '118', brand: 'Baccarat Rouge 540', price: 52 },
            { id: '139', brand: 'Les Sables Roses', price: 65 },
            { id: '114', brand: 'Ombre Nomade', price: 48 }
        ];

        function setCurrency(cur) {
            currentCurrency = cur;
            document.getElementById('opt-eur').classList.toggle('active', cur === 'EUR');
            document.getElementById('opt-dzd').classList.toggle('active', cur === 'DZD');
            
            // Ajustement automatique des frais de port si on change de devise
            const rate = document.getElementById('rate').value;
            const shipInput = document.getElementById('ship');
            if(cur === 'DZD') { shipInput.value = Math.round(2.5 * rate); } 
            else { shipInput.value = 2.5; }
            
            updateAll();
        }

        function renderCatalog() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            const rate = document.getElementById('rate').value;
            grid.innerHTML = '';
            
            const filtered = products.filter(p => p.brand.toLowerCase().includes(search) || p.id.toLowerCase().includes(search));

            filtered.forEach((p, index) => {
                const priceVal = (currentCurrency === 'EUR') ? p.price.toFixed(2) + ' €' : Math.round(p.price * rate).toLocaleString() + ' DA';
                const img = images[index % images.length]; // Alterne entre tes 4 photos
                
                grid.innerHTML += `
                    <div class="product-card flex flex-col">
                        <img src="${img}" class="product-img" alt="Chogan">
                        <div class="p-3">
                            <div class="text-[8px] font-black text-amber-700 italic">REF: ${p.id}</div>
                            <h3 class="text-[9px] font-black uppercase truncate mb-1">${p.brand}</h3>
                            <p class="text-[12px] font-black mb-3">${priceVal}</p>
                            <button onclick="addToCart('${p.brand}', ${p.price})" class="w-full bg-black text-white text-[8px] font-black py-2 rounded-lg uppercase">Prendre</button>
                        </div>
                    </div>`;
            });
        }

        // --- Fonctions PDF & Cart inchangées mais optimisées ---
        async function handlePDF(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(item => item.str).join(" ") + "\n";
                }
                extractData(fullText);
            };
            reader.readAsArrayBuffer(file);
        }

        function extractData(text) {
            const regex = /(\d+[A-Z]*)\.\s+([A-Za-z\s']+)\s+.*?\s+(\d+[A-Z]*[-]*70ml|70ml|50ml)\s*[-]*\s*(\d+,\d+)\s*€/gi;
            let match; const newProducts = [];
            while ((match = regex.exec(text)) !== null) {
                newProducts.push({ id: match[1], brand: match[2].trim(), price: parseFloat(match[4].replace(',', '.')) });
            }
            if (newProducts.length > 0) { products = newProducts; localStorage.setItem('chogan_db', JSON.stringify(products)); alert(products.length + " produits importés !"); }
            updateAll(); showTab(1);
        }

        function addToCart(brand, price) { cart.push({brand, price}); updateAll(); showTab(2); }
        function remove(i) { cart.splice(i, 1); updateAll(); }
        function resetCart() { cart = []; updateAll(); }
        function clearCatalog() { if(confirm("Supprimer tout le catalogue ?")) { products = []; localStorage.removeItem('chogan_db'); updateAll(); } }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const rate = document.getElementById('rate').value;
            list.innerHTML = cart.length ? '' : '<div class="text-center py-10 text-gray-300 font-black text-[10px] italic">PANIER VIDE</div>';
            cart.forEach((item, i) => {
                const p = (currentCurrency === 'EUR') ? item.price.toFixed(2) + ' €' : Math.round(item.price * rate).toLocaleString() + ' DA';
                list.innerHTML += `<div class="flex justify-between items-center p-4 border-2 border-black rounded-xl bg-white">
                    <div class="text-[9px] font-black uppercase">${item.brand}</div>
                    <div class="text-[10px] font-black">${p} <button onclick="remove(${i})" class="ml-3 text-red-600 font-bold text-lg">×</button></div>
                </div>`;
            });
        }

        function calcTotal() {
            const rate = document.getElementById('rate').value;
            const ship = parseFloat(document.getElementById('ship').value) || 0;
            const subTotal = cart.reduce((s, i) => s + i.price, 0);
            
            document.querySelectorAll('.currency-label').forEach(el => el.innerText = (currentCurrency === 'EUR' ? '€' : 'DA'));

            if (currentCurrency === 'EUR') {
                document.getElementById('final-total').innerText = (subTotal + ship).toFixed(2) + " €";
            } else {
                // Conversion du sous-total + frais déjà en DA
                document.getElementById('final-total').innerText = Math.round((subTotal * rate) + ship).toLocaleString() + " DA";
            }
        }

        function generateOrder() {
            if(cart.length === 0) return;
            const rate = document.getElementById('rate').value;
            const total = document.getElementById('final-total').innerText;
            let text = `📦 *COMMANDE CHOGAN - MARIE*\n---\n`;
            cart.forEach(i => {
                const p = (currentCurrency === 'EUR') ? i.price + ' €' : Math.round(i.price * rate) + ' DA';
                text += `• ${i.brand} : ${p}\n`;
            });
            text += `---\n*TOTAL : ${total}*`;
            navigator.clipboard.writeText(text);
            alert("Récapitulatif copié !");
        }

        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav' + n).classList.add('active');
            window.scrollTo(0,0);
        }

        function updateAll() { renderCatalog(); renderCart(); calcTotal(); }
        updateAll();
    </script>
</body>
</html>
