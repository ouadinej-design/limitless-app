<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGAN LIMITLESS - EXPERT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-grad: linear-gradient(135deg, #d4af37 0%, #f9e29c 50%, #b8860b 100%); }
        body { font-family: 'Inter', sans-serif; background: #000; color: white; margin: 0; user-select: none; }
        .chogan-font { font-family: 'Cinzel', serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .gold-text { color: var(--gold); }
        .gold-btn { background: var(--gold-grad); color: black; font-weight: 800; transition: all 0.2s; }
        .gold-btn:active { transform: scale(0.95); opacity: 0.9; }
        .reset-btn { font-size: 10px; color: #ff4444; border: 1px solid #ff444433; padding: 2px 8px; rounded: 4px; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <header class="p-5 sticky top-0 bg-black/95 backdrop-blur-md z-50 border-b border-[#d4af37]/20 flex justify-between items-center">
            <div>
                <h1 class="chogan-font text-xl gold-text tracking-[0.2em]">CHOGAN</h1>
                <p class="text-[9px] uppercase tracking-[0.3em] opacity-60 italic">Expert Limitless App</p>
            </div>
            <div class="bg-white/5 p-2 rounded-xl border border-white/10">
                <p class="text-[8px] text-gray-400 uppercase text-center mb-1 font-bold">Taux DA</p>
                <input type="number" id="exchange-rate" value="240" onchange="updatePrices()" class="bg-transparent w-10 text-center text-xs outline-none gold-text font-black">
            </div>
        </header>

        <div id="tab1" class="tab-content active p-4 space-y-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-black italic">CATALOGUE</h2>
                <button onclick="resetCatalogue()" class="reset-btn uppercase">Réinitialiser</button>
            </div>
            
            <div class="grid grid-cols-1 gap-4">
                <div class="glass p-4 rounded-3xl flex justify-between items-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full gold-gradient"></div>
                    <div>
                        <h3 class="font-bold text-lg">Parfums Luxe (100ml)</h3>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">Extraits de parfum 30%</p>
                        <p class="gold-text font-black mt-2"><span class="price-eur">30</span>€ / <span class="price-dzd">7200</span> DA</p>
                    </div>
                    <button onclick="addToCart('Parfum 100ml', 30)" class="gold-btn w-12 h-12 rounded-2xl text-2xl shadow-lg shadow-gold/20">＋</button>
                </div>

                <div class="glass p-4 rounded-3xl flex justify-between items-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full gold-gradient"></div>
                    <div>
                        <h3 class="font-bold text-lg">Huile d'Amande</h3>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">Soin Corps Pur</p>
                        <p class="gold-text font-black mt-2"><span class="price-eur">12</span>€ / <span class="price-dzd">2880</span> DA</p>
                    </div>
                    <button onclick="addToCart('Huile Amande', 12)" class="gold-btn w-12 h-12 rounded-2xl text-2xl shadow-lg shadow-gold/20">＋</button>
                </div>
            </div>
        </div>

        <div id="tab2" class="tab-content p-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-black italic">COMMANDE</h2>
                <button onclick="resetCart()" class="reset-btn uppercase">Vider Panier</button>
            </div>
            
            <div id="cart-items" class="space-y-3 mb-6">
                </div>
            
            <div class="glass p-6 rounded-[2.5rem] space-y-4 border-[#d4af37]/30">
                <div class="flex justify-between text-sm opacity-60">
                    <span>Articles</span>
                    <span id="subtotal">0€</span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <span>Livraison Algérie (DA)</span>
                    <input type="number" id="shipping" value="600" onchange="calculateTotal()" class="bg-white/10 border border-white/20 rounded-lg px-3 py-1 w-20 text-right outline-none gold-text font-bold">
                </div>
                <div class="h-[1px] bg-white/10"></div>
                <div class="flex justify-between items-end">
                    <span class="font-black text-xl italic">TOTAL</span>
                    <div class="text-right">
                        <p id="final-total" class="text-3xl font-black gold-text tracking-tighter">0 DA</p>
                        <p class="text-[9px] opacity-40 uppercase tracking-widest">Taxes incluses</p>
                    </div>
                </div>
            </div>
            <button onclick="alert('Commande enregistrée !')" class="gold-btn w-full p-5 rounded-2xl mt-8 text-xs uppercase tracking-[0.3em] shadow-xl shadow-gold/10">Valider & Envoyer</button>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-2xl border-t border-white/10 grid grid-cols-7 p-2 z-50">
            <button onclick="showTab(1)" class="flex flex-col items-center py-2"><span class="text-xl">🛍️</span><span class="text-[7px] mt-1 font-bold opacity-50 uppercase">Shop</span></button>
            <button onclick="showTab(2)" class="flex flex-col items-center py-2"><span class="text-xl">📜</span><span class="text-[7px] mt-1 font-bold opacity-50 uppercase">Ordre</span></button>
            <button onclick="showTab(3)" class="flex flex-col items-center py-2"><span class="text-xl">💎</span><span class="text-[7px] mt-1 font-bold opacity-50 uppercase">Club</span></button>
            <button onclick="showTab(4)" class="flex flex-col items-center py-2"><span class="text-xl">📈</span><span class="text-[7px] mt-1 font-bold opacity-50 uppercase">Goal</span></button>
            <button onclick="showTab(5)" class="flex flex-col items-center py-2"><span class="text-xl">📢</span><span class="text-[7px] mt-1 font-bold opacity-50 uppercase">News</span></button>
            <button onclick="showTab(6)" class="flex flex-col items-center py-2"><span class="text-xl">🏛️</span><span class="text-[7px] mt-1 font-bold opacity-50 uppercase">Learn</span></button>
            <button onclick="showTab(7)" class="flex flex-col items-center py-2"><span class="text-xl">👤</span><span class="text-[7px] mt-1 font-bold opacity-50 uppercase">Me</span></button>
        </nav>
    </div>

    <script>
        let cart = [];

        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
        }

        function updatePrices() {
            const rate = parseFloat(document.getElementById('exchange-rate').value);
            document.querySelectorAll('.price-eur').forEach(el => {
                const eur = parseFloat(el.innerText);
                const dzdEl = el.parentElement.querySelector('.price-dzd');
                dzdEl.innerText = Math.round(eur * rate);
            });
            calculateTotal();
        }

        function addToCart(name, price) {
            cart.push({name, price});
            renderCart();
            showTab(2); // Redirige vers le bon de commande
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            if(cart.length === 0) {
                container.innerHTML = '<div class="glass p-10 text-center rounded-3xl opacity-30 text-xs italic">Aucun article sélectionné</div>';
            } else {
                container.innerHTML = cart.map((item, index) => `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center animate-fadeIn">
                        <div>
                            <p class="font-bold text-sm uppercase">${item.name}</p>
                            <p class="text-xs gold-text">${item.price}€</p>
                        </div>
                        <button onclick="removeItem(${index})" class="text-red-500 font-bold px-3">✕</button>
                    </div>
                `).join('');
            }
            calculateTotal();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function calculateTotal() {
            const rate = parseFloat(document.getElementById('exchange-rate').value);
            const shipping = parseFloat(document.getElementById('shipping').value) || 0;
            const subtotalEur = cart.reduce((sum, item) => sum + item.price, 0);
            
            document.getElementById('subtotal').innerText = subtotalEur + "€";
            const totalDzd = (subtotalEur * rate) + shipping;
            document.getElementById('final-total').innerText = Math.round(totalDzd).toLocaleString() + " DA";
        }

        function resetCart() { if(confirm("Vider le bon de commande ?")) { cart = []; renderCart(); } }
        function resetCatalogue() { location.reload(); }

        // Initialisation
        updatePrices();
        renderCart();
    </script>
</body>
</html>
